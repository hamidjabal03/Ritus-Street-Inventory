<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ritus Street Inventory</title>
    
    <!-- 1. Load Library Utama Duluan -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- 2. Firebase SDK & Config -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB2xfDX5PU_nP5TEPSYFL6xmBcS0wZrj_c",
            authDomain: "ritus-street-inventory.firebaseapp.com",
            projectId: "ritus-street-inventory",
            storageBucket: "ritus-street-inventory.firebasestorage.app",
            messagingSenderId: "249697895281",
            appId: "1:249697895281:web:c44bccdd16958c9d28ecd0"
        };

        const app = initializeApp(firebaseConfig);
        window.RitusAuth = getAuth(app);
        window.FirebaseReady = true;
    </script>
</head>
<body class="bg-[#0f172a] text-white">

    <!-- Container Utama -->
    <div id="root">
        <div style="display: flex; height: 100vh; align-items: center; justify-content: center;">
            <div style="text-align: center;">
                <p style="font-family: monospace; font-size: 12px; letter-spacing: 2px;">WAKING UP RITUS SYSTEM...</p>
            </div>
        </div>
    </div>

    <!-- 3. Logika React (Internal Script) -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [ready, setReady] = useState(false);
            const [user, setUser] = useState(null);
            const [creds, setCreds] = useState({ email: '', pass: '' });

            useEffect(() => {
                const check = setInterval(() => {
                    if (window.FirebaseReady && window.RitusAuth) {
                        setReady(true);
                        window.RitusAuth.onAuthStateChanged(u => setUser(u));
                        clearInterval(check);
                    }
                }, 500);
                return () => clearInterval(check);
            }, []);

            const doLogin = async (e) => {
                e.preventDefault();
                try {
                    const { signInWithEmailAndPassword } = await import("https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js");
                    await signInWithEmailAndPassword(window.RitusAuth, creds.email, creds.pass);
                } catch (err) { alert("Akses Ditolak!"); }
            };

            if (!ready) return null;

            return (
                <div className="min-h-screen flex items-center justify-center bg-slate-950 p-6 font-sans">
                    {user ? (
                        <div className="text-center border border-white/10 p-10 rounded-3xl bg-slate-900 shadow-2xl">
                            <h1 className="text-2xl font-bold mb-2">SISTEM AKTIF</h1>
                            <p className="text-slate-500 mb-8">{user.email}</p>
                            <button onClick={() => window.RitusAuth.signOut()} className="bg-red-500/10 text-red-500 border border-red-500/20 px-8 py-2 rounded-xl hover:bg-red-500 hover:text-white transition-all">LOGOUT</button>
                        </div>
                    ) : (
                        <div className="w-full max-w-sm bg-slate-900 border border-white/5 p-8 rounded-[2rem] shadow-2xl">
                            <div className="text-center mb-8">
                                <h2 className="text-3xl font-black tracking-tighter italic">RITUS STREET</h2>
                                <div className="h-1 w-12 bg-blue-600 mx-auto mt-1 rounded-full"></div>
                            </div>
                            
                            <form onSubmit={doLogin} className="space-y-4">
                                <input type="email" placeholder="Email" onChange={e => setCreds({...creds, email: e.target.value})} className="w-full bg-slate-800 border border-slate-700 p-4 rounded-2xl outline-none focus:border-blue-500 transition-all" required />
                                <input type="password" placeholder="Password" onChange={e => setCreds({...creds, pass: e.target.value})} className="w-full bg-slate-800 border border-slate-700 p-4 rounded-2xl outline-none focus:border-blue-500 transition-all" required />
                                <button className="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-bold tracking-widest shadow-lg shadow-blue-600/20 active:scale-95 transition-all">ACCESS DASHBOARD</button>
                            </form>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
