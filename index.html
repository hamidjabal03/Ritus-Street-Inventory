<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ritus Street Inventory</title>
    
    <!-- Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <!-- Firebase Setup -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB2xfDX5PU_nP5TEPSYFL6xmBcS0wZrj_c",
            authDomain: "ritus-street-inventory.firebaseapp.com",
            projectId: "ritus-street-inventory",
            storageBucket: "ritus-street-inventory.firebasestorage.app",
            messagingSenderId: "249697895281",
            appId: "1:249697895281:web:c44bccdd16958c9d28ecd0"
        };

        try {
            const app = initializeApp(firebaseConfig);
            window.RitusAuth = getAuth(app);
            window.RitusLogin = signInWithEmailAndPassword;
            window.RitusLogout = signOut;
            window.FirebaseReady = true;
        } catch (e) { console.error(e); }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        /* Animasi Shake untuk Error seperti sebelumnya */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .error-shake { animation: shake 0.2s ease-in-out 0s 2; }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [ready, setReady] = useState(false);
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('Dashboard');
            const [email, setEmail] = useState('');
            const [pass, setPass] = useState('');
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');

            useEffect(() => {
                const check = setInterval(() => {
                    if (window.FirebaseReady && window.RitusAuth) {
                        window.RitusAuth.onAuthStateChanged(u => setUser(u));
                        setReady(true);
                        clearInterval(check);
                    }
                }, 500);
                return () => clearInterval(check);
            }, []);

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError('');
                try {
                    await window.RitusLogin(window.RitusAuth, email.trim(), pass);
                } catch (err) {
                    setError("AKSES DITOLAK: EMAIL ATAU PASSWORD SALAH.");
                } finally {
                    setLoading(false);
                }
            };

            if (!ready) return (
                <div className="min-h-screen flex items-center justify-center">
                    <div className="w-8 h-8 border-2 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                </div>
            );

            // TAMPILAN DASHBOARD (SETELAH LOGIN)
            if (user) {
                return (
                    <div className="flex min-h-screen bg-[#020617]">
                        {/* Sidebar Sesuai Keinginan */}
                        <aside className="w-64 bg-slate-900/50 border-r border-white/10 p-6 flex flex-col">
                            <div className="mb-10 text-center">
                                <h2 className="text-2xl font-black italic tracking-tighter">RITUS STREET</h2>
                            </div>
                            <nav className="flex-1 space-y-2">
                                {['Dashboard', 'Apparel', 'Accessories', 'Cans'].map(tab => (
                                    <button 
                                        key={tab} 
                                        onClick={() => setActiveTab(tab)}
                                        className={`w-full text-left px-4 py-3 rounded-xl font-bold text-sm transition-all ${activeTab === tab ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-500 hover:text-white'}`}
                                    >
                                        {tab}
                                    </button>
                                ))}
                            </nav>
                            <button onClick={() => window.RitusLogout(window.RitusAuth)} className="mt-auto py-3 bg-red-500/10 text-red-500 rounded-xl font-bold text-xs border border-red-500/20 hover:bg-red-500 hover:text-white transition-all">
                                LOGOUT
                            </button>
                        </aside>

                        {/* Konten Utama */}
                        <main className="flex-1 p-10">
                            <h1 className="text-3xl font-black mb-2 uppercase tracking-tight">{activeTab}</h1>
                            <p className="text-slate-500 text-sm mb-10">Operator Aktif: {user.email}</p>
                            
                            <div className="grid grid-cols-3 gap-6 mb-10">
                                <div className="glass p-8 rounded-[2rem]">
                                    <p className="text-[10px] font-bold text-slate-500 tracking-widest uppercase mb-2">Total Stok</p>
                                    <h2 className="text-4xl font-black">0</h2>
                                </div>
                                <div className="glass p-8 rounded-[2rem]">
                                    <p className="text-[10px] font-bold text-slate-500 tracking-widest uppercase mb-2">Proses</p>
                                    <h2 className="text-4xl font-black text-blue-500">0</h2>
                                </div>
                                <div className="glass p-8 rounded-[2rem]">
                                    <p className="text-[10px] font-bold text-slate-500 tracking-widest uppercase mb-2">Keluar</p>
                                    <h2 className="text-4xl font-black text-slate-700">0</h2>
                                </div>
                            </div>

                            <div className="glass rounded-[2.5rem] p-20 text-center border-dashed border-white/10">
                                <p className="text-slate-600 italic">Database {activeTab} Belum Tersedia.</p>
                            </div>
                        </main>
                    </div>
                );
            }

            // TAMPILAN LOGIN (BALIK KE DESAIN AWAL YANG ABANG SUKA)
            return (
                <div className="min-h-screen flex items-center justify-center p-6 bg-[radial-gradient(circle_at_top,_var(--tw-gradient-stops))] from-slate-900 via-slate-950 to-black">
                    <div className="w-full max-w-sm animate-in fade-in slide-in-from-bottom-4 duration-700">
                        <div className="text-center mb-10">
                            <h2 className="text-4xl font-black tracking-tighter text-white italic">RITUS STREET</h2>
                            <p className="text-blue-500 text-[10px] tracking-[0.4em] font-bold uppercase mt-2">Inventory Management</p>
                        </div>

                        <div className="glass p-8 rounded-[2.5rem] shadow-2xl">
                            {error && (
                                <div className="mb-6 p-4 bg-red-500/10 border border-red-500/20 rounded-2xl flex items-center gap-3 error-shake">
                                    <div className="w-2 h-2 bg-red-500 rounded-full animate-pulse"></div>
                                    <p className="text-red-400 text-[11px] font-semibold uppercase tracking-wider">{error}</p>
                                </div>
                            )}

                            <form onSubmit={handleLogin} className="space-y-4">
                                <div>
                                    <label className="text-[10px] font-bold text-slate-500 uppercase ml-2 mb-2 block">Identity</label>
                                    <input 
                                        type="email" 
                                        placeholder="admin@ritus.com" 
                                        onChange={e => setEmail(e.target.value)} 
                                        className="w-full bg-slate-800/50 border border-white/5 p-4 rounded-2xl outline-none focus:border-blue-500/50 transition-all text-white" 
                                        required 
                                    />
                                </div>
                                <div>
                                    <label className="text-[10px] font-bold text-slate-500 uppercase ml-2 mb-2 block">Security Code</label>
                                    <input 
                                        type="password" 
                                        placeholder="••••••••" 
                                        onChange={e => setPass(e.target.value)} 
                                        className="w-full bg-slate-800/50 border border-white/5 p-4 rounded-2xl outline-none focus:border-blue-500/50 transition-all text-white" 
                                        required 
                                    />
                                </div>
                                <button 
                                    disabled={loading}
                                    className="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-extrabold text-sm tracking-[0.2em] shadow-lg shadow-blue-600/20 active:scale-[0.98] transition-all disabled:opacity-50"
                                >
                                    {loading ? 'VERIFYING...' : 'LOGIN SYSTEM'}
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
