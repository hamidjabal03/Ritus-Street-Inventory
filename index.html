<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ritus Street Inventory - Cloud</title>
    <!-- Tailwind CSS untuk styling modern -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons untuk ikon aplikasi -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .modal-animate { animation: zoomIn 0.2s ease-out; }
        @keyframes zoomIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <!-- Load React & Babel Core agar browser bisa baca JSX -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel" data-type="module">
        // Import Firebase SDK via CDN
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, addDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const { useState, useEffect } = React;

        // Firebase Configuration
        const firebaseConfig = { 
            apiKey: "AIzaSyB2xfDX5PU_nP5TEPSYFL6xmBcS0wZrj_c", 
            authDomain: "ritus-street-inventory.firebaseapp.com", 
            projectId: "ritus-street-inventory", 
            storageBucket: "ritus-street-inventory.appspot.com", 
            messagingSenderId: "1032338604753", 
            appId: "1:1032338604753:web:96e87f17b660c6d649887f" 
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'ritus-street-v1';

        function App() {
            const [user, setUser] = useState(null);
            const [inventory, setInventory] = useState([]);
            const [transactions, setTransactions] = useState([]);
            const [loading, setLoading] = useState(true);
            const [showModal, setShowModal] = useState(null); 
            const [selectedItem, setSelectedItem] = useState(null);
            const [tab, setTab] = useState('inventory');

            useEffect(() => {
                const unsubscribeAuth = onAuthStateChanged(auth, async (u) => {
                    if (!u) {
                        try { await signInAnonymously(auth); } catch (e) { console.error(e); }
                    } else {
                        setUser(u);
                        setLoading(false);
                    }
                });
                return () => unsubscribeAuth();
            }, []);

            useEffect(() => {
                if (!user) return;
                const invRef = collection(db, 'artifacts', appId, 'public', 'data', 'inventory');
                const unsubInv = onSnapshot(invRef, (snapshot) => {
                    setInventory(snapshot.docs.map(d => ({ id: d.id, ...d.data() })));
                    setTimeout(() => lucide.createIcons(), 100);
                });

                const transRef = collection(db, 'artifacts', appId, 'public', 'data', 'transactions');
                const unsubTrans = onSnapshot(transRef, (snapshot) => {
                    const data = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                    setTransactions(data.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp)));
                    setTimeout(() => lucide.createIcons(), 100);
                });

                return () => { unsubInv(); unsubTrans(); };
            }, [user]);

            const handleUpdateStock = async (e) => {
                e.preventDefault();
                const amount = parseInt(e.target.amount.value);
                const type = e.target.type.value;
                const newStock = type === 'in' ? (selectedItem.stock || 0) + amount : (selectedItem.stock || 0) - amount;

                if (newStock < 0) return alert("Stok tidak cukup!");

                try {
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'inventory', selectedItem.id), { ...selectedItem, stock: newStock }, { merge: true });
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'transactions'), {
                        itemName: selectedItem.name, type, amount, timestamp: new Date().toISOString()
                    });
                    setShowModal(null);
                } catch (e) { alert("Error!"); }
            };

            const handleAddItem = async (e) => {
                e.preventDefault();
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'inventory'), {
                        name: e.target.name.value, size: e.target.size.value, stock: parseInt(e.target.stock.value), createdAt: new Date().toISOString()
                    });
                    setShowModal(null);
                } catch (e) { alert("Error!"); }
            };

            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center bg-slate-900 text-white">
                    <div className="w-10 h-10 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                    <p className="text-[10px] uppercase tracking-widest font-black italic">Loading Database...</p>
                </div>
            );

            return (
                <div className="min-h-screen pb-20">
                    <nav className="bg-white border-b h-20 px-6 flex items-center justify-between sticky top-0 z-50">
                        <div className="flex items-center gap-3">
                            <div className="bg-indigo-600 p-2 rounded-xl text-white shadow-lg shadow-indigo-100">
                                <i data-lucide="package" size="20"></i>
                            </div>
                            <h1 className="font-black italic uppercase tracking-tighter text-xl">Ritus <span className="text-indigo-600">Cloud</span></h1>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => setTab('inventory')} className={`px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${tab === 'inventory' ? 'bg-slate-900 text-white' : 'text-slate-400'}`}>Stok</button>
                            <button onClick={() => setTab('history')} className={`px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${tab === 'history' ? 'bg-slate-900 text-white' : 'text-slate-400'}`}>Log</button>
                        </div>
                    </nav>

                    <main className="max-w-6xl mx-auto p-6">
                        {tab === 'inventory' ? (
                            <>
                                <div className="flex justify-between items-center mb-8">
                                    <h2 className="text-2xl font-black italic uppercase tracking-tighter">Inventory List</h2>
                                    <button onClick={() => setShowModal('add')} className="bg-indigo-600 text-white px-5 py-3 rounded-2xl font-black text-[10px] uppercase tracking-widest flex items-center gap-2">
                                        <i data-lucide="plus" size="14"></i> Tambah Barang
                                    </button>
                                </div>
                                <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                                    {inventory.map(item => (
                                        <div key={item.id} className="bg-white p-6 rounded-[2.5rem] border-2 border-slate-100 shadow-sm relative overflow-hidden group hover:shadow-xl transition-all">
                                            <span className="text-[10px] font-black uppercase bg-indigo-50 text-indigo-600 px-3 py-1 rounded-lg italic">{item.size}</span>
                                            <h3 className="font-black italic uppercase text-lg mt-4 mb-6 leading-tight h-12 overflow-hidden">{item.name}</h3>
                                            <div className="flex justify-between items-end">
                                                <div>
                                                    <p className="text-[8px] font-black text-slate-400 uppercase italic">Stok</p>
                                                    <p className="text-5xl font-black italic tracking-tighter">{item.stock}</p>
                                                </div>
                                                <div className="flex flex-col gap-2">
                                                    <button onClick={() => {setSelectedItem(item); setShowModal('in');}} className="w-10 h-10 bg-emerald-500 text-white rounded-xl flex items-center justify-center hover:scale-110 transition-transform"><i data-lucide="plus" size="20"></i></button>
                                                    <button onClick={() => {setSelectedItem(item); setShowModal('out');}} className="w-10 h-10 bg-rose-500 text-white rounded-xl flex items-center justify-center hover:scale-110 transition-transform"><i data-lucide="minus" size="20"></i></button>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </>
                        ) : (
                            <div className="bg-white rounded-[2rem] border-2 border-slate-100 overflow-hidden shadow-sm">
                                <div className="p-6 bg-slate-50 border-b">
                                    <h2 className="font-black italic uppercase tracking-widest text-sm">Aktivitas Gudang</h2>
                                </div>
                                <table className="w-full text-left">
                                    <thead className="bg-slate-50/50 text-[10px] font-black uppercase text-slate-400 italic">
                                        <tr>
                                            <th className="p-6">Waktu</th>
                                            <th className="p-6">Artikel</th>
                                            <th className="p-6 text-center">Tipe</th>
                                            <th className="p-6 text-right">Jumlah</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {transactions.map(t => (
                                            <tr key={t.id} className="text-xs font-bold uppercase italic">
                                                <td className="p-6 text-slate-400">{new Date(t.timestamp).toLocaleTimeString('id-ID')}</td>
                                                <td className="p-6">{t.itemName}</td>
                                                <td className="p-6 text-center">
                                                    <span className={`px-3 py-1 rounded-full text-[9px] ${t.type === 'in' ? 'bg-emerald-100 text-emerald-600' : 'bg-rose-100 text-rose-600'}`}>
                                                        {t.type === 'in' ? 'Masuk' : 'Keluar'}
                                                    </span>
                                                </td>
                                                <td className={`p-6 text-right font-black ${t.type === 'in' ? 'text-emerald-500' : 'text-rose-500'}`}>
                                                    {t.type === 'in' ? '+' : '-'}{t.amount}
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </main>

                    {showModal && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
                            <div className="bg-white rounded-[2.5rem] w-full max-w-sm overflow-hidden modal-animate shadow-2xl">
                                {showModal === 'add' ? (
                                    <form onSubmit={handleAddItem} className="p-8">
                                        <h2 className="text-xl font-black italic uppercase mb-6">Tambah Artikel</h2>
                                        <div className="space-y-4">
                                            <input name="name" placeholder="Nama Artikel" required className="w-full p-4 bg-slate-50 rounded-2xl border-2 border-slate-100 font-bold uppercase text-sm outline-none focus:border-indigo-500" />
                                            <div className="flex gap-3">
                                                <input name="size" placeholder="Size" required className="w-1/2 p-4 bg-slate-50 rounded-2xl border-2 border-slate-100 font-bold uppercase text-sm outline-none" />
                                                <input name="stock" type="number" placeholder="Stok" required className="w-1/2 p-4 bg-slate-50 rounded-2xl border-2 border-slate-100 font-bold text-sm outline-none" />
                                            </div>
                                            <button type="submit" className="w-full py-4 bg-indigo-600 text-white font-black rounded-2xl uppercase italic tracking-widest mt-2 hover:bg-indigo-700">Simpan</button>
                                            <button type="button" onClick={() => setShowModal(null)} className="w-full text-slate-400 font-bold text-[10px] uppercase mt-2">Batal</button>
                                        </div>
                                    </form>
                                ) : (
                                    <form onSubmit={handleUpdateStock} className="p-8 text-center">
                                        <input type="hidden" name="type" value={showModal} />
                                        <h2 className={`text-xl font-black italic uppercase mb-2 ${showModal === 'in' ? 'text-emerald-500' : 'text-rose-500'}`}>
                                            {showModal === 'in' ? 'Stock In' : 'Stock Out'}
                                        </h2>
                                        <p className="text-[10px] font-bold text-slate-400 uppercase italic mb-8">{selectedItem?.name}</p>
                                        <input name="amount" type="number" required min="1" autoFocus placeholder="0" className="w-full text-center text-7xl font-black italic bg-transparent outline-none text-slate-900 mb-8" />
                                        <button type="submit" className={`w-full py-4 text-white font-black rounded-2xl uppercase italic tracking-widest shadow-lg ${showModal === 'in' ? 'bg-emerald-500 shadow-emerald-100' : 'bg-rose-500 shadow-rose-100'}`}>Konfirmasi</button>
                                        <button type="button" onClick={() => setShowModal(null)} className="w-full text-slate-400 font-bold text-[10px] uppercase mt-4">Tutup</button>
                                    </form>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
