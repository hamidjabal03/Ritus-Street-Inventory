<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ritus Street Inventory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #F8FAFC;
            color: #0F172A;
        }

        .ritus-card { 
            border-radius: 2.5rem; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(0,0,0,0.05);
        }
        
        .ritus-card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1); 
            border-color: #6366f1;
        }

        .glass-header { 
            background: rgba(255, 255, 255, 0.8); 
            backdrop-filter: blur(12px); 
            border-bottom: 1px solid rgba(0,0,0,0.05); 
        }

        #loading-overlay {
            position: fixed; inset: 0; background: #0F172A; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; transition: all 0.4s ease;
        }

        .loading-done {
            opacity: 0;
            pointer-events: none;
            visibility: hidden;
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none; margin: 0;
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading-overlay">
        <div class="w-12 h-12 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="text-[10px] font-black uppercase tracking-[0.3em] animate-pulse">RITUS CLOUD CONNECTING</p>
        <button id="bypass-btn" onclick="document.getElementById('loading-overlay').classList.add('loading-done')" class="mt-8 text-[9px] text-slate-500 underline opacity-50 hover:opacity-100 transition-opacity">MASUK SEKARANG (FORCE START)</button>
    </div>

    <div id="root"></div>

    <!-- Firebase System -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, addDoc, deleteDoc, writeBatch } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Fungsi Global untuk UI
        window.hideLoading = () => {
            const loader = document.getElementById('loading-overlay');
            if(loader) loader.classList.add('loading-done');
        };

        try {
            const config = JSON.parse(__firebase_config || '{}');
            const app = initializeApp(config);
            const auth = getAuth(app);
            const db = getFirestore(app);
            
            window.RitusFirebase = { auth, db, collection, doc, setDoc, onSnapshot, addDoc, deleteDoc, writeBatch, signInAnonymously, onAuthStateChanged };
        } catch (e) {
            console.error("Firebase Error", e);
            // Tetap izinkan masuk jika firebase gagal load (offline mode demo)
            setTimeout(window.hideLoading, 2000);
        }
    </script>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const [inventory, setInventory] = useState([]);
            const [transactions, setTransactions] = useState([]);
            const [tab, setTab] = useState('dashboard');
            const [search, setSearch] = useState('');
            const [showModal, setShowModal] = useState(null);
            const [selectedItem, setSelectedItem] = useState(null);
            const [isImporting, setIsImporting] = useState(false);
            
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'ritus-street-v1';
            const fileInputRef = useRef(null);

            useEffect(() => {
                const interval = setInterval(() => {
                    if (window.RitusFirebase) {
                        const { auth, signInAnonymously, onAuthStateChanged, db, collection, onSnapshot } = window.RitusFirebase;
                        
                        signInAnonymously(auth).catch(() => window.hideLoading());
                        
                        onAuthStateChanged(auth, (user) => {
                            if (user) {
                                window.hideLoading();
                                const invRef = collection(db, 'artifacts', appId, 'public', 'data', 'inventory');
                                const transRef = collection(db, 'artifacts', appId, 'public', 'data', 'transactions');

                                onSnapshot(invRef, (s) => setInventory(s.docs.map(d => ({id: d.id, ...d.data()}))), (e) => window.hideLoading());
                                onSnapshot(transRef, (s) => setTransactions(s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp))));
                            } else {
                                // Jika tidak ada user dalam 3 detik, paksa buka UI
                                setTimeout(window.hideLoading, 3000);
                            }
                        });
                        clearInterval(interval);
                    }
                }, 100);

                // Safety timeout: Jika 5 detik belum masuk, paksa masuk.
                setTimeout(window.hideLoading, 5000);

                return () => clearInterval(interval);
            }, []);

            useEffect(() => { if(window.lucide) window.lucide.createIcons(); }, [tab, inventory, isImporting]);

            const handleUpdateStock = async (e) => {
                e.preventDefault();
                const amount = parseInt(e.target.amount.value);
                if (!amount || amount <= 0) return;
                
                const type = showModal === 'in' ? 'in' : 'out';
                const newStock = type === 'in' ? (selectedItem.stock || 0) + amount : (selectedItem.stock || 0) - amount;

                if(newStock < 0) return alert("Stok tidak cukup!");

                const { db, doc, setDoc, addDoc, collection } = window.RitusFirebase;
                
                try {
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'inventory', selectedItem.id), {
                        ...selectedItem, stock: newStock
                    }, { merge: true });

                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'transactions'), {
                        itemId: selectedItem.id,
                        itemName: selectedItem.name,
                        size: selectedItem.size,
                        type,
                        amount,
                        timestamp: new Date().toISOString()
                    });
                    setShowModal(null);
                } catch(err) {
                    alert("Gagal memperbarui Cloud.");
                }
            };

            const handleCSVImport = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                setIsImporting(true);
                const reader = new FileReader();
                reader.onload = async (event) => {
                    const text = event.target.result;
                    const rows = text.split('\n').filter(row => row.trim() !== '');
                    const { db, doc, setDoc, addDoc, collection, writeBatch } = window.RitusFirebase;

                    const batch = writeBatch(db);
                    let count = 0;
                    
                    for (let i = 1; i < rows.length; i++) {
                        const cols = rows[i].split(';');
                        if (cols.length < 5) continue;

                        const name = cols[0].trim();
                        const info = cols[1].trim() || 'ALL'; 
                        const category = cols[2].trim() || 'Ritus Wear';
                        const type = cols[3].trim().toLowerCase() === 'in' ? 'in' : 'out';
                        const amount = parseInt(cols[4]) || 0;

                        if (!name || isNaN(amount) || amount === 0) continue;

                        const itemId = `${name.toLowerCase().replace(/\s+/g, '-')}-${info.toLowerCase().replace(/\s+/g, '-')}`;
                        const existingItem = inventory.find(item => item.id === itemId);
                        
                        const currentStock = existingItem ? (existingItem.stock || 0) : 0;
                        const newStock = type === 'in' ? currentStock + amount : currentStock - amount;

                        const itemRef = doc(db, 'artifacts', appId, 'public', 'data', 'inventory', itemId);
                        batch.set(itemRef, {
                            id: itemId,
                            name,
                            size: info,
                            category,
                            stock: Math.max(0, newStock),
                            lastUpdated: new Date().toISOString()
                        }, { merge: true });

                        const transRef = doc(collection(db, 'artifacts', appId, 'public', 'data', 'transactions'));
                        batch.set(transRef, {
                            itemId,
                            itemName: name,
                            size: info,
                            type,
                            amount,
                            timestamp: new Date().toISOString(),
                            source: 'CSV Import'
                        });
                        count++;
                    }

                    if (count > 0) {
                        try {
                            await batch.commit();
                            alert(`Berhasil mengimpor ${count} baris data!`);
                        } catch (err) {
                            alert("Gagal menyimpan ke Cloud.");
                        }
                    } else {
                        alert("Tidak ada data valid yang ditemukan.");
                    }
                    setIsImporting(false);
                    e.target.value = '';
                };
                reader.readAsText(file);
            };

            const totalStock = inventory.reduce((acc, curr) => acc + (curr.stock || 0), 0);
            const filteredInventory = inventory.filter(i => i.name.toLowerCase().includes(search.toLowerCase()));

            return (
                <div className="min-h-screen flex flex-col md:flex-row overflow-hidden h-screen">
                    {/* Navigation Sidebar */}
                    <div className="w-full md:w-64 bg-slate-900 text-white p-8 flex flex-col shrink-0">
                        <div className="mb-12 flex items-center gap-3">
                            <div className="w-10 h-10 bg-indigo-600 rounded-2xl flex items-center justify-center font-black italic text-xl">R</div>
                            <h1 className="font-black italic text-2xl tracking-tighter">RITUS</h1>
                        </div>
                        
                        <nav className="space-y-3 flex-1 overflow-y-auto">
                            {[
                                { id: 'dashboard', icon: 'layout-dashboard', label: 'DASHBOARD' },
                                { id: 'inventory', icon: 'package', label: 'STOK BARANG' },
                                { id: 'history', icon: 'clock', label: 'RIWAYAT' }
                            ].map(item => (
                                <button 
                                    key={item.id}
                                    onClick={() => setTab(item.id)}
                                    className={`w-full flex items-center gap-4 p-4 rounded-2xl text-[10px] font-black tracking-widest transition-all ${tab === item.id ? 'bg-indigo-600 text-white' : 'text-slate-500 hover:text-white hover:bg-white/5'}`}
                                >
                                    <i data-lucide={item.icon} className="w-4 h-4"></i>
                                    {item.label}
                                </button>
                            ))}
                        </nav>

                        <div className="mt-auto pt-8 border-t border-slate-800">
                            <button 
                                onClick={() => fileInputRef.current?.click()}
                                disabled={isImporting}
                                className="w-full flex items-center justify-center gap-3 p-4 bg-slate-800 rounded-2xl text-[10px] font-black tracking-widest hover:bg-slate-700 transition-all disabled:opacity-50"
                            >
                                <i data-lucide={isImporting ? "refresh-cw" : "upload"} className={`w-4 h-4 ${isImporting ? 'animate-spin' : ''}`}></i>
                                {isImporting ? 'IMPORTING...' : 'IMPOR CSV'}
                            </button>
                            <input type="file" ref={fileInputRef} onChange={handleCSVImport} accept=".csv" className="hidden" />
                        </div>
                    </div>

                    {/* Main Content */}
                    <div className="flex-1 flex flex-col h-screen overflow-hidden">
                        <header className="glass-header h-24 px-8 flex items-center justify-between shrink-0">
                            <h2 className="font-black italic uppercase text-xs tracking-[0.4em] text-slate-400">{tab}</h2>
                            <div className="flex items-center gap-6">
                                <div className="text-right hidden md:block">
                                    <p className="text-[10px] font-black italic text-slate-900">ADMIN</p>
                                    <p className="text-[8px] font-bold text-slate-400 uppercase tracking-widest">Master Cloud</p>
                                </div>
                                <div className="w-12 h-12 bg-indigo-50 rounded-2xl border-2 border-white shadow-sm flex items-center justify-center text-indigo-600">
                                    <i data-lucide="user" className="w-6 h-6"></i>
                                </div>
                            </div>
                        </header>

                        <main className="flex-1 overflow-y-auto p-8 bg-[#F8FAFC]">
                            {tab === 'dashboard' && (
                                <div className="space-y-8 animate-in fade-in slide-in-from-bottom-4 duration-500">
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                        <div className="ritus-card bg-white p-10 flex flex-col group">
                                            <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest italic mb-6">Total SKU</p>
                                            <h3 className="text-6xl font-black italic text-slate-900 tracking-tighter">{inventory.length}</h3>
                                        </div>
                                        <div className="ritus-card bg-indigo-600 p-10 flex flex-col text-white shadow-xl shadow-indigo-100">
                                            <p className="text-[10px] font-black text-indigo-200 uppercase tracking-widest italic mb-6">Inventory Stock</p>
                                            <h3 className="text-6xl font-black italic tracking-tighter">{totalStock}</h3>
                                        </div>
                                        <div className="ritus-card bg-slate-900 p-10 flex flex-col text-white">
                                            <p className="text-[10px] font-black text-slate-500 uppercase tracking-widest italic mb-6">Log Database</p>
                                            <h3 className="text-6xl font-black italic tracking-tighter">{transactions.length}</h3>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                        <div className="ritus-card bg-white p-10 border border-slate-100">
                                            <h4 className="font-black italic uppercase text-xs tracking-[0.2em] mb-10">Aktivitas Terakhir</h4>
                                            <div className="space-y-6">
                                                {transactions.slice(0, 5).map(t => (
                                                    <div key={t.id} className="flex justify-between items-center pb-6 border-b border-slate-50 last:border-0 last:pb-0">
                                                        <div>
                                                            <p className="font-black italic uppercase text-sm tracking-tight">{t.itemName} <span className="text-slate-300">({t.size})</span></p>
                                                            <p className="text-[8px] font-bold text-slate-400 uppercase tracking-widest">{new Date(t.timestamp).toLocaleTimeString()}</p>
                                                        </div>
                                                        <div className={`text-right font-black italic text-2xl tracking-tighter ${t.type === 'in' ? 'text-emerald-500' : 'text-rose-500'}`}>
                                                            {t.type === 'in' ? '+' : '-'}{t.amount}
                                                        </div>
                                                    </div>
                                                ))}
                                                {transactions.length === 0 && <p className="text-center py-10 text-slate-300 font-bold uppercase text-[10px]">No logs found.</p>}
                                            </div>
                                        </div>
                                        <div className="ritus-card bg-slate-50 border border-dashed border-slate-200 p-10 flex flex-col justify-center items-center text-center">
                                            <div className="w-16 h-16 bg-white rounded-2xl shadow-sm flex items-center justify-center mb-6">
                                                <i data-lucide="cloud-upload" className="w-6 h-6 text-indigo-600"></i>
                                            </div>
                                            <h4 className="font-black italic uppercase text-sm mb-2">Impor CSV Masal</h4>
                                            <p className="text-[9px] text-slate-400 font-bold uppercase tracking-widest mb-8">Update stok cepat melalui file .csv</p>
                                            <button onClick={() => fileInputRef.current?.click()} className="px-8 py-4 bg-white border border-slate-200 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:border-indigo-600">PILIH FILE</button>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {tab === 'inventory' && (
                                <div className="space-y-8 animate-in fade-in slide-in-from-right-4">
                                    <div className="relative w-full max-w-md">
                                        <i data-lucide="search" className="absolute left-6 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-300"></i>
                                        <input 
                                            type="text" 
                                            placeholder="CARI ARTIKEL..."
                                            className="w-full pl-16 pr-8 py-5 bg-white rounded-[2rem] text-[10px] font-black outline-none border border-slate-100 shadow-sm focus:border-indigo-600 uppercase tracking-widest"
                                            value={search}
                                            onChange={(e) => setSearch(e.target.value)}
                                        />
                                    </div>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                                        {filteredInventory.map(item => (
                                            <div key={item.id} className="ritus-card bg-white p-8 flex flex-col shadow-sm">
                                                <div className="flex justify-between items-start mb-8">
                                                    <span className="text-[9px] font-black bg-indigo-50 text-indigo-600 px-4 py-1.5 rounded-full uppercase italic">SIZE {item.size}</span>
                                                </div>
                                                <h3 className="text-2xl font-black italic uppercase leading-none mb-1 tracking-tighter">{item.name}</h3>
                                                <p className="text-[8px] font-bold text-slate-300 mb-10 uppercase tracking-widest italic">{item.category}</p>
                                                <div className="mt-auto flex items-end justify-between border-t border-slate-50 pt-6">
                                                    <div>
                                                        <p className="text-[8px] font-black text-slate-300 uppercase mb-1 italic">STOCK</p>
                                                        <p className="text-5xl font-black italic tracking-tighter text-slate-900">{item.stock || 0}</p>
                                                    </div>
                                                    <div className="flex gap-2">
                                                        <button onClick={() => {setSelectedItem(item); setShowModal('in')}} className="w-12 h-12 bg-indigo-600 text-white rounded-2xl flex items-center justify-center hover:scale-105 transition-transform"><i data-lucide="plus" className="w-5 h-5"></i></button>
                                                        <button onClick={() => {setSelectedItem(item); setShowModal('out')}} className="w-12 h-12 bg-slate-900 text-white rounded-2xl flex items-center justify-center hover:scale-105 transition-transform"><i data-lucide="minus" className="w-5 h-5"></i></button>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {tab === 'history' && (
                                <div className="ritus-card bg-white border border-slate-100 shadow-sm overflow-hidden">
                                    <table className="w-full text-left">
                                        <thead className="bg-slate-50">
                                            <tr>
                                                <th className="px-10 py-8 text-[10px] font-black uppercase text-slate-400 tracking-widest italic">Detail</th>
                                                <th className="px-10 py-8 text-[10px] font-black uppercase text-slate-400 tracking-widest italic text-center">Tipe</th>
                                                <th className="px-10 py-8 text-[10px] font-black uppercase text-slate-400 tracking-widest italic text-right">Jumlah</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-50">
                                            {transactions.map(t => (
                                                <tr key={t.id}>
                                                    <td className="px-10 py-8">
                                                        <p className="font-black italic text-base uppercase">{t.itemName} ({t.size})</p>
                                                        <p className="text-[9px] font-bold text-slate-400 mt-1 uppercase">
                                                            {new Date(t.timestamp).toLocaleString('id-ID')} {t.source && <span className="text-indigo-400">({t.source})</span>}
                                                        </p>
                                                    </td>
                                                    <td className="px-10 py-8 text-center">
                                                        <span className={`px-4 py-2 rounded-full text-[9px] font-black italic uppercase ${t.type === 'in' ? 'bg-emerald-50 text-emerald-600' : 'bg-rose-50 text-rose-600'}`}>
                                                            {t.type === 'in' ? 'IN' : 'OUT'}
                                                        </span>
                                                    </td>
                                                    <td className={`px-10 py-8 text-right font-black italic text-3xl tracking-tighter ${t.type === 'in' ? 'text-emerald-500' : 'text-rose-500'}`}>
                                                        {t.type === 'in' ? '+' : '-'}{t.amount}
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            )}
                        </main>
                    </div>

                    {/* Transaction Modal */}
                    {showModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[200] flex items-center justify-center p-6">
                            <div className="bg-white rounded-[3.5rem] w-full max-w-sm overflow-hidden shadow-2xl animate-in zoom-in duration-200">
                                <div className={`p-10 ${showModal === 'in' ? 'bg-indigo-600' : 'bg-slate-900'} text-white`}>
                                    <h2 className="text-2xl font-black italic uppercase mb-1">{showModal === 'in' ? 'Stok Masuk' : 'Stok Keluar'}</h2>
                                    <p className="text-[10px] font-bold opacity-60 uppercase">{selectedItem?.name} ({selectedItem?.size})</p>
                                </div>
                                <form onSubmit={handleUpdateStock} className="p-10">
                                    <input 
                                        name="amount" 
                                        type="number" 
                                        required 
                                        autoFocus
                                        className="w-full text-center text-8xl font-black italic text-slate-900 outline-none bg-transparent tracking-tighter mb-10" 
                                        placeholder="0"
                                    />
                                    <div className="grid grid-cols-2 gap-4">
                                        <button type="button" onClick={() => setShowModal(null)} className="py-5 bg-slate-100 text-slate-400 rounded-2xl font-black text-[10px] uppercase">BATAL</button>
                                        <button type="submit" className={`py-5 text-white rounded-2xl font-black text-[10px] uppercase shadow-lg ${showModal === 'in' ? 'bg-indigo-600' : 'bg-slate-900'}`}>SIMPAN</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
