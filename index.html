<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ritus Street Inventory</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f172a]">
    <div id="loader" class="fixed inset-0 z-[9999] flex flex-col items-center justify-center bg-[#0f172a] transition-opacity duration-500">
        <div class="w-12 h-12 border-4 border-blue-500/20 border-t-blue-500 rounded-full animate-spin mb-4"></div>
        <p class="text-white font-bold tracking-[0.3em] text-sm">RITUS STREET</p>
    </div>

    <div id="root"></div>

    <!-- 1. Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- 2. Firebase Config (Harus dimuat lebih dulu) -->
    <script src="firebase-config.js" type="module"></script>

    <!-- 3. Logic Bridge (Menghubungkan Babel dan Module) -->
    <script type="text/babel">
        // Fungsi untuk menunggu sampai Firebase Ready
        const waitForConfig = setInterval(() => {
            if (window.RitusDB) {
                clearInterval(waitForConfig);
                loadApp();
            }
        }, 100);

        function loadApp() {
            // Memuat file App.js secara dinamis agar diproses Babel
            const script = document.createElement('script');
            script.src = 'App.js';
            script.type = 'text/babel';
            document.body.appendChild(script);
        }
    </script>
</body>
</html>
