<!-- Bagian Firebase SDK (Ganti yang lama) -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB2xfDX5PU_nP5TEPSYFL6xmBcS0wZrj_c",
        authDomain: "ritus-street-inventory.firebaseapp.com",
        projectId: "ritus-street-inventory",
        storageBucket: "ritus-street-inventory.firebasestorage.app",
        messagingSenderId: "249697895281",
        appId: "1:249697895281:web:c44bccdd16958c9d28ecd0"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Kirim fungsi ke window agar bisa dipakai React
    window.RitusAuth = auth;
    window.RitusLogin = signInWithEmailAndPassword;
    window.RitusSignOut = signOut;
    window.FirebaseReady = true;
</script>

<!-- Bagian React Logic (Ganti yang lama) -->
<script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
        const [ready, setReady] = useState(false);
        const [user, setUser] = useState(null);
        const [email, setEmail] = useState('');
        const [pass, setPass] = useState('');
        const [loading, setLoading] = useState(false);
        const [error, setError] = useState('');

        useEffect(() => {
            const check = setInterval(() => {
                if (window.FirebaseReady) {
                    window.RitusAuth.onAuthStateChanged(u => setUser(u));
                    setReady(true);
                    clearInterval(check);
                }
            }, 500);
            return () => clearInterval(check);
        }, []);

        const handleLogin = async (e) => {
            e.preventDefault();
            setLoading(true);
            setError('');
            
            try {
                // Memanggil fungsi login yang sudah kita siapkan di window
                await window.RitusLogin(window.RitusAuth, email, pass);
            } catch (err) {
                console.error("Login Error Code:", err.code);
                // Penjelasan error yang lebih detail untuk diagnosa
                if (err.code === 'auth/network-request-failed') {
                    setError("Masalah koneksi/Domain belum di-Authorized.");
                } else {
                    setError("Email atau Password salah.");
                }
            } finally {
                setLoading(false);
            }
        };

        if (!ready) return null;

        return (
            <div className="min-h-screen flex items-center justify-center p-6 bg-slate-950">
                {user ? (
                    <div className="w-full max-w-md p-10 rounded-[2.5rem] bg-slate-900 border border-white/10 text-center shadow-2xl">
                        <h1 className="text-2xl font-bold text-white mb-2">Akses Diterima</h1>
                        <p className="text-slate-400 text-sm mb-8">{user.email}</p>
                        <button onClick={() => window.RitusSignOut(window.RitusAuth)} className="w-full py-4 rounded-2xl bg-red-500/10 text-red-500 border border-red-500/20 font-bold hover:bg-red-500 hover:text-white transition-all">LOGOUT</button>
                    </div>
                ) : (
                    <div className="w-full max-w-sm">
                        <div className="text-center mb-8">
                            <h2 className="text-3xl font-black italic text-white tracking-tighter">RITUS STREET</h2>
                        </div>
                        <div className="bg-slate-900 p-8 rounded-[2rem] border border-white/10 shadow-2xl">
                            {error && (
                                <div className="mb-6 p-4 bg-red-500/10 border border-red-500/20 rounded-2xl text-red-400 text-[11px] font-bold text-center uppercase tracking-widest">
                                    {error}
                                </div>
                            )}
                            <form onSubmit={handleLogin} className="space-y-4">
                                <input type="email" placeholder="Email Admin" onChange={e => setEmail(e.target.value)} className="w-full bg-slate-800 border border-white/5 p-4 rounded-2xl text-white outline-none focus:border-blue-500" required />
                                <input type="password" placeholder="Password" onChange={e => setPass(e.target.value)} className="w-full bg-slate-800 border border-white/5 p-4 rounded-2xl text-white outline-none focus:border-blue-500" required />
                                <button disabled={loading} className="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-bold text-white transition-all shadow-lg shadow-blue-600/20">
                                    {loading ? 'AUTHENTICATING...' : 'ACCESS SYSTEM'}
                                </button>
                            </form>
                        </div>
                    </div>
                )}
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
