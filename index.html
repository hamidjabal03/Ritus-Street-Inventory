<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ritus Street Inventory</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f172a]">

    <!-- ELEMEN INI HARUS ADA -->
    <div id="root"></div>

    <!-- 1. LIBRARIES (Urutan sangat penting) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

    <!-- 2. FIREBASE SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB2xfDX5PU_nP5TEPSYFL6xmBcS0wZrj_c",
            authDomain: "ritus-street-inventory.firebaseapp.com",
            projectId: "ritus-street-inventory",
            storageBucket: "ritus-street-inventory.firebasestorage.app",
            messagingSenderId: "249697895281",
            appId: "1:249697895281:web:c44bccdd16958c9d28ecd0"
        };

        const app = initializeApp(firebaseConfig);
        window.RitusAuth = getAuth(app);
        window.RitusDB = getFirestore(app);
        window.FirebaseReady = true;
    </script>

    <!-- 3. LOGIC APLIKASI -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [isLoaded, setIsLoaded] = useState(false);
            const [user, setUser] = useState(null);
            const [email, setEmail] = useState("");
            const [password, setPassword] = useState("");
            const [loading, setLoading] = useState(false);
            const [errorMessage, setErrorMessage] = useState("");

            useEffect(() => {
                const checkFirebase = setInterval(() => {
                    if (window.FirebaseReady) {
                        setIsLoaded(true);
                        window.RitusAuth.onAuthStateChanged((u) => setUser(u));
                        clearInterval(checkFirebase);
                    }
                }, 500);
                return () => clearInterval(checkFirebase);
            }, []);

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                setErrorMessage("");
                
                try {
                    const { signInWithEmailAndPassword } = await import("https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js");
                    await signInWithEmailAndPassword(window.RitusAuth, email, password);
                } catch (error) {
                    setErrorMessage("Akses ditolak. Periksa kembali email & password.");
                } finally {
                    setLoading(false);
                }
            };

            if (!isLoaded) return (
                <div className="min-h-screen flex items-center justify-center bg-[#0f172a]">
                    <div className="w-10 h-10 border-4 border-blue-500/20 border-t-blue-500 rounded-full animate-spin"></div>
                </div>
            );

            return (
                <div className="min-h-screen flex items-center justify-center p-4 bg-slate-950 font-['Inter',sans-serif]">
                    {user ? (
                        <div className="bg-white/10 backdrop-blur-xl p-10 rounded-2xl border border-white/10 text-center max-w-sm w-full">
                            <h2 className="text-2xl font-bold text-white mb-2">Sistem Aktif</h2>
                            <p className="text-slate-400 mb-8 text-sm">{user.email}</p>
                            <button onClick={() => window.RitusAuth.signOut()} className="w-full bg-red-500/20 hover:bg-red-500/40 text-red-400 py-3 rounded-xl font-semibold border border-red-500/30 transition-all">
                                LOGOUT
                            </button>
                        </div>
                    ) : (
                        <div className="w-full max-w-md">
                            <div className="text-center mb-8">
                                <h1 className="text-4xl font-extrabold text-white tracking-tighter">RITUS STREET</h1>
                                <p className="text-blue-500 uppercase tracking-[0.3em] text-[10px] font-bold">Inventory System</p>
                            </div>

                            <div className="bg-slate-900/50 p-8 rounded-3xl border border-white/5 shadow-2xl">
                                {errorMessage && (
                                    <div className="mb-6 p-4 bg-red-500/10 border border-red-500/20 rounded-xl">
                                        <p className="text-red-400 text-xs text-center font-medium">{errorMessage}</p>
                                    </div>
                                )}

                                <form onSubmit={handleLogin} className="space-y-5">
                                    <input 
                                        type="email" 
                                        placeholder="Admin Email" 
                                        value={email}
                                        onChange={(e) => setEmail(e.target.value)}
                                        className="w-full bg-slate-800 border border-slate-700 p-4 rounded-2xl outline-none text-white focus:border-blue-500 transition-all" 
                                        required
                                    />
                                    <input 
                                        type="password" 
                                        placeholder="Password" 
                                        value={password}
                                        onChange={(e) => setPassword(e.target.value)}
                                        className="w-full bg-slate-800 border border-slate-700 p-4 rounded-2xl outline-none text-white focus:border-blue-500 transition-all" 
                                        required
                                    />
                                    <button 
                                        type="submit"
                                        disabled={loading}
                                        className="w-full py-4 rounded-2xl font-bold bg-blue-600 hover:bg-blue-500 text-white transition-all disabled:opacity-50"
                                    >
                                        {loading ? 'MENGECEK...' : 'MASUK KE SISTEM'}
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
