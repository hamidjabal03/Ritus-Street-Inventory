<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ritus Street Inventory</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#020617] text-white">

    <div id="root">
        <!-- Tampilan Cadangan jika React Gagal -->
        <div class="min-h-screen flex items-center justify-center">
            <div class="text-center">
                <div class="w-8 h-8 border-2 border-blue-500/20 border-t-blue-500 rounded-full animate-spin mx-auto mb-4"></div>
                <p class="text-[10px] tracking-[0.3em] text-slate-500 uppercase">Booting Ritus System...</p>
            </div>
        </div>
    </div>

  <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [isReady, setIsReady] = useState(false);
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('Dashboard'); // Navigasi Tab
            const [email, setEmail] = useState('');
            const [pass, setPass] = useState('');
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');

            useEffect(() => {
                const check = setInterval(() => {
                    if (window.FirebaseReady && window.RitusAuth) {
                        window.RitusAuth.onAuthStateChanged(u => setUser(u));
                        setIsReady(true);
                        clearInterval(check);
                    }
                }, 500);
                return () => clearInterval(check);
            }, []);

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError('');
                try {
                    await window.RitusLogin(window.RitusAuth, email.trim(), pass);
                } catch (err) {
                    setError("AKSES DITOLAK: EMAIL ATAU PASSWORD SALAH");
                } finally {
                    setLoading(false);
                }
            };

            if (!isReady) return null;

            // --- TAMPILAN DASHBOARD (SETELAH LOGIN) ---
            if (user) {
                return (
                    <div className="flex min-h-screen bg-[#020617] text-slate-300 font-sans animate-in fade-in duration-500">
                        {/* Sidebar */}
                        <aside className="w-64 bg-slate-900/50 border-r border-white/5 p-6 hidden md:flex flex-col">
                            <div className="mb-10">
                                <h2 className="text-xl font-black italic text-white tracking-tighter">RITUS CTRL</h2>
                                <p className="text-[10px] text-blue-500 font-bold tracking-[0.2em]">INVENTORY v1.0</p>
                            </div>
                            
                            <nav className="flex-1 space-y-2">
                                {['Dashboard', 'Apparel', 'Accessories', 'Cans'].map((item) => (
                                    <button 
                                        key={item} 
                                        onClick={() => setActiveTab(item)}
                                        className={`w-full text-left px-4 py-3 rounded-xl transition-all font-semibold text-sm ${activeTab === item ? 'bg-blue-600 text-white shadow-lg shadow-blue-600/20' : 'text-slate-500 hover:bg-white/5 hover:text-slate-300'}`}
                                    >
                                        {item}
                                    </button>
                                ))}
                            </nav>

                            <div className="pt-6 border-t border-white/5">
                                <button onClick={() => window.RitusLogout(window.RitusAuth)} className="w-full py-3 rounded-xl bg-red-500/10 text-red-500 border border-red-500/20 text-xs font-bold hover:bg-red-500 hover:text-white transition-all">
                                    LOGOUT SYSTEM
                                </button>
                            </div>
                        </aside>

                        {/* Main Content */}
                        <main className="flex-1 p-8 overflow-y-auto">
                            <header className="flex justify-between items-center mb-10">
                                <div>
                                    <h1 className="text-2xl font-bold text-white">{activeTab} Panel</h1>
                                    <p className="text-slate-500 text-sm">Operator: {user.email}</p>
                                </div>
                                <button className="bg-white/5 hover:bg-white/10 border border-white/10 text-white px-6 py-2 rounded-xl font-bold text-sm transition-all">
                                    + Entry Baru
                                </button>
                            </header>

                            {/* Stat Cards */}
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                                <div className="bg-slate-900 border border-white/5 p-6 rounded-3xl">
                                    <p className="text-slate-500 text-[10px] uppercase font-bold tracking-widest mb-1">Total Stok</p>
                                    <h3 className="text-3xl font-black text-white">0</h3>
                                </div>
                                <div className="bg-slate-900 border border-white/5 p-6 rounded-3xl">
                                    <p className="text-slate-500 text-[10px] uppercase font-bold tracking-widest mb-1">In Progress</p>
                                    <h3 className="text-3xl font-black text-blue-500">0</h3>
                                </div>
                                <div className="bg-slate-900 border border-white/5 p-6 rounded-3xl">
                                    <p className="text-slate-500 text-[10px] uppercase font-bold tracking-widest mb-1">Log Hari Ini</p>
                                    <h3 className="text-3xl font-black text-emerald-500">0</h3>
                                </div>
                            </div>

                            {/* Placeholder Table Area */}
                            <div className="bg-slate-900/50 border border-white/5 rounded-[2rem] p-12 text-center border-dashed">
                                <p className="text-slate-600 font-medium italic">Database {activeTab} masih kosong.</p>
                            </div>
                        </main>
                    </div>
                );
            }

            // --- TAMPILAN LOGIN (JIKA BELUM LOGIN) ---
            return (
                <div className="min-h-screen flex items-center justify-center p-6 bg-[#020617]">
                    <div className="w-full max-w-sm">
                        <div className="text-center mb-10">
                            <h2 className="text-4xl font-black italic text-white tracking-tighter">RITUS STREET</h2>
                        </div>
                        <div className="bg-slate-900/80 backdrop-blur-xl p-8 rounded-[2.5rem] border border-white/10 shadow-2xl">
                            {error && <div className="mb-6 p-4 bg-red-500/10 border border-red-500/20 rounded-2xl text-red-400 text-[10px] font-bold text-center uppercase tracking-widest leading-relaxed">{error}</div>}
                            <form onSubmit={handleLogin} className="space-y-4">
                                <input type="email" placeholder="Admin Email" onChange={e => setEmail(e.target.value)} className="w-full bg-slate-800/50 border border-white/5 p-4 rounded-2xl text-white outline-none focus:border-blue-500 transition-all" required />
                                <input type="password" placeholder="Security Code" onChange={e => setPass(e.target.value)} className="w-full bg-slate-800/50 border border-white/5 p-4 rounded-2xl text-white outline-none focus:border-blue-500 transition-all" required />
                                <button disabled={loading} className="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-black text-xs tracking-widest text-white transition-all shadow-lg shadow-blue-600/20 disabled:opacity-50">
                                    {loading ? 'VERIFYING...' : 'LOGIN SYSTEM'}
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
