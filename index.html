<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ritus Street | Authorized Access</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f8fafc; margin: 0; }
        .sidebar-dark { width: 280px; height: 100vh; position: fixed; background: #0f172a; border-right: 1px solid #1e293b; z-index: 50; }
        .content-area { margin-left: 280px; padding: 3rem; min-height: 100vh; background: #020617; }
        .card-ritus { background: #0f172a; border: 1px solid #1e293b; border-radius: 2rem; transition: all 0.3s ease; }
        .card-ritus:hover { border-color: #3b82f6; transform: translateY(-4px); }
        .login-overlay { background: #020617; position: fixed; inset: 0; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        input::-webkit-inner-spin-button { display: none; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .bg-glow { box-shadow: 0 0 20px rgba(59, 130, 246, 0.15); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, className = "w-5 h-5" }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        function App() {
            const [isAuth, setIsAuth] = useState(false);
            const [showPass, setShowPass] = useState(false);
            const [activeTab, setActiveTab] = useState('Daftar Stok');
            const [secretKey, setSecretKey] = useState('');
            
            // State data (Sudah disesuaikan dengan Ritus.csv)
            const [inventory, setInventory] = useState([
                { id: 1, name: "Ritus Tees", info: "S", category: "Apparel", qty: 5 },
                { id: 2, name: "Ritus Tees", info: "M", category: "Apparel", qty: 10 },
                { id: 3, name: "Ritus Tees", info: "L", category: "Apparel", qty: 15 },
                { id: 4, name: "Belazo 400 ML Putih", info: "Black", category: "Kaleng", qty: 20 },
                { id: 5, name: "Kalung Ritus", info: "Silver", category: "Aksesoris", qty: 15 }
            ]);
            
            const [logs, setLogs] = useState([
                { id: 101, date: "03/05/2026", name: "Ritus Tees", info: "S", type: "IN", qty: 5, category: "Apparel" },
                { id: 102, date: "04/05/2026", name: "Ritus Tees", info: "M", type: "IN", qty: 10, category: "Apparel" },
                { id: 103, date: "05/05/2026", name: "Ritus Tees", info: "L", type: "IN", qty: 15, category: "Apparel" }
            ]);

            const adjustQty = (id, change) => {
                const item = inventory.find(i => i.id === id);
                if (!item) return;
                if (change < 0 && item.qty + change < 0) return;
                
                setInventory(prev => prev.map(i => i.id === id ? { ...i, qty: i.qty + change } : i));
                setLogs(prev => [{
                    id: Date.now(),
                    date: new Date().toLocaleDateString('id-ID'),
                    name: item.name,
                    info: item.info,
                    type: change > 0 ? "IN" : "OUT",
                    qty: Math.abs(change),
                    category: item.category
                }, ...prev]);
            };

            const addNewItem = (e) => {
                e.preventDefault();
                const fd = new FormData(e.target);
                const name = fd.get('name');
                const qty = parseInt(fd.get('qty'));
                const category = fd.get('category');
                const info = fd.get('info');
                
                const newItem = { id: Date.now(), name, qty, category, info };
                setInventory(prev => [...prev, newItem]);
                setLogs(prev => [{
                    id: Date.now() + 1,
                    date: new Date().toLocaleDateString('id-ID'),
                    name, info, type: "IN", qty, category
                }, ...prev]);
                e.target.reset();
            };

            // Login View dengan Identitas Jelas
            if (!isAuth) {
                return (
                    <div className="login-overlay">
                        <div className="w-full max-w-sm p-10 bg-slate-900/50 border border-slate-800 rounded-[2.5rem] shadow-2xl backdrop-blur-xl">
                            <div className="text-center mb-10">
                                <div className="inline-flex p-4 bg-blue-600/10 rounded-3xl mb-4 border border-blue-600/20">
                                    <Icon name="warehouse" className="w-10 h-10 text-blue-500" />
                                </div>
                                <h1 className="text-3xl font-black italic tracking-tighter text-white uppercase">RITUS STREET</h1>
                                <p className="text-[10px] text-slate-500 font-bold uppercase tracking-[0.3em] mt-2">Warehouse Management System</p>
                            </div>
                            
                            <div className="space-y-6">
                                <div className="p-4 bg-slate-800/40 rounded-2xl border border-slate-700/50 flex items-center gap-4">
                                    <div className="w-10 h-10 bg-slate-700 rounded-full flex items-center justify-center font-black text-slate-300">A</div>
                                    <div>
                                        <p className="text-[9px] font-black text-slate-500 uppercase">Akses Identitas</p>
                                        <p className="text-sm font-bold text-white uppercase">Admin Warehouse</p>
                                    </div>
                                </div>

                                <div className="space-y-2">
                                    <label className="text-[10px] font-black text-slate-500 uppercase ml-2 italic">Secret Access Key</label>
                                    <div className="relative">
                                        <input 
                                            type={showPass ? "text" : "password"} 
                                            value={secretKey}
                                            onChange={(e) => setSecretKey(e.target.value)}
                                            placeholder="••••••••" 
                                            className="w-full bg-slate-800/80 border border-slate-700 p-5 rounded-2xl text-white outline-none focus:border-blue-500 font-black tracking-[0.2em]" 
                                        />
                                        <button onClick={() => setShowPass(!showPass)} className="absolute right-4 top-5 text-slate-500 hover:text-blue-400">
                                            <Icon name={showPass ? "eye-off" : "eye"} />
                                        </button>
                                    </div>
                                </div>
                                
                                <button 
                                    onClick={() => setIsAuth(true)} 
                                    className="w-full bg-blue-600 hover:bg-blue-500 py-5 rounded-2xl font-black uppercase text-[10px] tracking-widest text-white transition-all shadow-xl shadow-blue-900/20 flex items-center justify-center gap-2"
                                >
                                    <Icon name="lock" className="w-4 h-4" /> Buka Akses Gudang
                                </button>
                                
                                <p className="text-center text-[9px] text-slate-600 font-bold uppercase tracking-tight">Ritus Street © 2026 . All Rights Reserved</p>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex">
                    <aside className="sidebar-dark p-8 flex flex-col">
                        <div className="mb-10">
                            <h2 className="text-2xl font-black italic tracking-tighter text-white uppercase">Ritus<span className="text-blue-500">.</span></h2>
                            <div className="mt-6 flex items-center gap-3 p-3 bg-slate-800/50 rounded-2xl border border-slate-700/30">
                                <div className="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-[10px] font-black">AD</div>
                                <div>
                                    <p className="text-[8px] font-black text-slate-500 uppercase">Session Active</p>
                                    <p className="text-[10px] font-bold text-white uppercase">Admin Utama</p>
                                </div>
                            </div>
                        </div>
                        
                        <nav className="space-y-2 flex-1">
                            {[
                                { id: 'Daftar Stok', icon: 'package' },
                                { id: 'Input Barang', icon: 'plus-square' },
                                { id: 'Riwayat', icon: 'clock' }
                            ].map(tab => (
                                <button 
                                    key={tab.id} 
                                    onClick={() => setActiveTab(tab.id)}
                                    className={`w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest transition-all ${activeTab === tab.id ? 'bg-blue-600 text-white shadow-lg shadow-blue-900/30' : 'text-slate-500 hover:bg-slate-800 hover:text-slate-300'}`}
                                >
                                    <Icon name={tab.icon} className="w-4 h-4" /> {tab.id}
                                </button>
                            ))}
                        </nav>
                        
                        <button onClick={() => setIsAuth(false)} className="mt-auto py-4 bg-rose-900/10 text-rose-500 rounded-2xl font-black text-[10px] uppercase border border-rose-900/20 hover:bg-rose-600 hover:text-white transition-all">Sign Out</button>
                    </aside>

                    <main className="content-area flex-1">
                        <header className="mb-12 flex justify-between items-end">
                            <div>
                                <h1 className="text-5xl font-black uppercase tracking-tight text-white italic">{activeTab}</h1>
                                <div className="flex items-center gap-2 mt-2">
                                    <div className="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
                                    <p className="text-slate-500 font-bold text-[10px] uppercase tracking-[0.2em] italic">Database Online & Syncing</p>
                                </div>
                            </div>
                        </header>

                        {activeTab === 'Daftar Stok' && (
                            <div className="space-y-16">
                                {/* BATCH APPAREL */}
                                <section>
                                    <div className="flex items-center gap-4 mb-8">
                                        <div className="px-4 py-1 bg-blue-600 text-white text-[10px] font-black uppercase rounded-full tracking-widest italic">Essential</div>
                                        <h3 className="text-xl font-black uppercase text-slate-200 italic tracking-tighter">Apparel Batch</h3>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                        {inventory.filter(i => i.category === 'Apparel').map(item => (
                                            <div key={item.id} className="card-ritus p-8 border-l-4 border-l-blue-600">
                                                <div className="flex justify-between items-start mb-6">
                                                    <div>
                                                        <h4 className="font-black text-white text-lg uppercase leading-none">{item.name}</h4>
                                                        <p className="text-[10px] text-blue-400 mt-2 font-black uppercase tracking-widest italic">Size: {item.info}</p>
                                                    </div>
                                                    <Icon name="shirt" className="text-slate-700" />
                                                </div>
                                                <div className="flex items-baseline gap-2 mb-8">
                                                    <span className="text-6xl font-black text-white tracking-tighter">{item.qty}</span>
                                                    <span className="text-slate-500 font-black text-xs uppercase italic tracking-widest">Available</span>
                                                </div>
                                                <div className="grid grid-cols-2 gap-2">
                                                    <button onClick={() => adjustQty(item.id, 1)} className="bg-slate-800 p-4 rounded-xl font-black text-[9px] uppercase hover:bg-blue-600 transition-all text-slate-400 hover:text-white">In</button>
                                                    <button onClick={() => adjustQty(item.id, -1)} className="bg-slate-800 p-4 rounded-xl font-black text-[9px] uppercase hover:bg-rose-600 transition-all text-slate-400 hover:text-white">Out</button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </section>

                                {/* STOK LAIN */}
                                <section>
                                    <div className="flex items-center gap-4 mb-8 opacity-50">
                                        <div className="px-4 py-1 bg-slate-700 text-white text-[10px] font-black uppercase rounded-full tracking-widest italic">Misc</div>
                                        <h3 className="text-xl font-black uppercase text-slate-200 italic tracking-tighter">Other Items</h3>
                                    </div>
                                    <div className="card-ritus overflow-hidden bg-slate-900/30">
                                        <table className="w-full text-left">
                                            <thead className="bg-slate-800/30 text-[9px] font-black text-slate-500 uppercase tracking-[0.2em]">
                                                <tr><th className="p-6">Product Item</th><th className="p-6">Type</th><th className="p-6">Inventory</th><th className="p-6 text-right">Actions</th></tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-800">
                                                {inventory.filter(i => i.category !== 'Apparel').map(item => (
                                                    <tr key={item.id} className="hover:bg-slate-800/20 transition-all">
                                                        <td className="p-6">
                                                            <div className="font-bold text-slate-200 uppercase text-sm tracking-tight">{item.name}</div>
                                                            <div className="text-[9px] text-slate-500 italic mt-1 font-black uppercase">{item.info}</div>
                                                        </td>
                                                        <td className="p-6">
                                                            <span className="px-3 py-1 bg-slate-800 border border-slate-700 text-slate-400 rounded-lg text-[9px] font-black uppercase">{item.category}</span>
                                                        </td>
                                                        <td className="p-6 font-black text-2xl text-white italic tracking-tighter">{item.qty}</td>
                                                        <td className="p-6 flex justify-end gap-2">
                                                            <button onClick={() => adjustQty(item.id, 1)} className="w-10 h-10 bg-slate-800 text-slate-400 rounded-xl flex items-center justify-center hover:bg-blue-600 hover:text-white transition-all border border-slate-700"><Icon name="plus" className="w-4 h-4" /></button>
                                                            <button onClick={() => adjustQty(item.id, -1)} className="w-10 h-10 bg-slate-800 text-slate-400 rounded-xl flex items-center justify-center hover:bg-rose-600 hover:text-white transition-all border border-slate-700"><Icon name="minus" className="w-4 h-4" /></button>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </section>
                            </div>
                        )}

                        {activeTab === 'Input Barang' && (
                            <div className="max-w-xl">
                                <div className="card-ritus p-10 bg-gradient-to-br from-slate-900 to-slate-950 shadow-2xl">
                                    <div className="flex items-center gap-3 mb-10">
                                        <div className="w-10 h-10 bg-blue-600/20 rounded-xl flex items-center justify-center text-blue-500"><Icon name="plus-circle" /></div>
                                        <h3 className="text-[10px] font-black uppercase text-white tracking-[0.4em] italic">New Inventory Entry</h3>
                                    </div>
                                    <form onSubmit={addNewItem} className="space-y-8">
                                        <div className="space-y-2">
                                            <label className="text-[9px] font-black text-slate-500 uppercase ml-2 tracking-widest">Product Name</label>
                                            <input name="name" required className="w-full bg-slate-800/40 border border-slate-800 p-5 rounded-2xl outline-none focus:border-blue-500 font-bold uppercase text-white shadow-inner" />
                                        </div>
                                        <div className="grid grid-cols-2 gap-6">
                                            <div className="space-y-2">
                                                <label className="text-[9px] font-black text-slate-500 uppercase ml-2 tracking-widest">Variation</label>
                                                <input name="info" placeholder="Color/Size" className="w-full bg-slate-800/40 border border-slate-800 p-5 rounded-2xl outline-none focus:border-blue-500 font-bold uppercase text-white" />
                                            </div>
                                            <div className="space-y-2">
                                                <label className="text-[9px] font-black text-slate-500 uppercase ml-2 tracking-widest">Initial Qty</label>
                                                <input name="qty" type="number" required className="w-full bg-slate-800/40 border border-slate-800 p-5 rounded-2xl outline-none focus:border-blue-500 font-bold text-white" />
                                            </div>
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-[9px] font-black text-slate-500 uppercase ml-2 tracking-widest">Category</label>
                                            <select name="category" className="w-full bg-slate-800/40 border border-slate-800 p-5 rounded-2xl outline-none focus:border-blue-500 font-bold text-white cursor-pointer appearance-none">
                                                <option>Apparel</option>
                                                <option>Aksesoris</option>
                                                <option>Kaleng</option>
                                                <option>Lainnya</option>
                                            </select>
                                        </div>
                                        <button className="w-full py-6 bg-blue-600 hover:bg-blue-500 text-white rounded-2xl font-black uppercase text-[10px] tracking-widest shadow-xl shadow-blue-900/30 transition-all flex items-center justify-center gap-3">
                                            <Icon name="save" className="w-4 h-4" /> Register Product
                                        </button>
                                    </form>
                                </div>
                            </div>
                        )}

                        {activeTab === 'Riwayat' && (
                            <div className="card-ritus overflow-hidden bg-slate-900/30">
                                <table className="w-full text-left">
                                    <thead className="bg-slate-800/30 text-[9px] font-black text-slate-500 uppercase tracking-[0.2em]">
                                        <tr><th className="p-6">Timestamp</th><th className="p-6">Activity</th><th className="p-6">Qty</th><th className="p-6 text-right">Status</th></tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-800">
                                        {logs.map(log => (
                                            <tr key={log.id} className="hover:bg-slate-800/20 transition-all">
                                                <td className="p-6 text-[9px] text-slate-500 font-black uppercase">{log.date}</td>
                                                <td className="p-6">
                                                    <div className="font-bold uppercase text-slate-200 text-sm">{log.name}</div>
                                                    <div className="text-[9px] text-slate-600 italic font-black uppercase">{log.info} | {log.category}</div>
                                                </td>
                                                <td className="p-6 font-black text-2xl text-white italic tracking-tighter">{log.qty}</td>
                                                <td className="p-6 text-right">
                                                    <span className={`px-4 py-1 rounded-full text-[8px] font-black tracking-widest ${log.type === 'IN' ? 'bg-emerald-900/30 text-emerald-400 border border-emerald-500/20' : 'bg-rose-900/30 text-rose-400 border border-rose-500/20'}`}>
                                                        {log.type === 'IN' ? 'STOK MASUK' : 'STOK KELUAR'}
                                                    </span>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
