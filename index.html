<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ritus Street Inventory</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f172a] text-white">

    <!-- Indikator Status -->
    <div id="status-debug" class="fixed top-2 left-2 bg-red-600 text-[10px] p-1 rounded z-[9999]">
        Status: Memuat Library...
    </div>

    <div id="root" class="min-h-screen flex items-center justify-center">
        <div id="loading-ui" class="text-center">
            <div class="w-10 h-10 border-4 border-blue-500/20 border-t-blue-500 rounded-full animate-spin mx-auto mb-4"></div>
            <p class="text-slate-400">Menghubungkan ke Database...</p>
        </div>
    </div>

    <!-- 1. Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

    <!-- 2. Config -->
    <script src="firebase-config.js" type="module"></script>

    <!-- 3. Logic -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [isReady, setIsReady] = useState(false);

            useEffect(() => {
                const debug = document.getElementById('status-debug');
                debug.innerText = "Status: Script Ok, Menunggu window.RitusDB...";
                debug.style.backgroundColor = "orange";

                const checker = setInterval(() => {
                    if (window.RitusDB) {
                        debug.innerText = "Status: Firebase Terhubung!";
                        debug.style.backgroundColor = "green";
                        setIsReady(true);
                        clearInterval(checker);
                        
                        // Sembunyikan debug setelah sukses
                        setTimeout(() => debug.style.display = 'none', 3000);
                    }
                }, 500);
                return () => clearInterval(checker);
            }, []);

            if (!isReady) return null;

            return (
                <div className="bg-slate-800 p-8 rounded-xl shadow-2xl border border-slate-700 w-full max-w-md animate-in fade-in zoom-in duration-500">
                    <h2 className="text-2xl font-bold text-center mb-1">Ritus Street</h2>
                    <p className="text-center text-slate-400 text-xs mb-8 uppercase tracking-widest">Inventory System</p>
                    
                    <div className="space-y-4">
                        <div>
                            <label className="text-xs text-slate-400 mb-1 block">Email Admin</label>
                            <input type="email" placeholder="admin@ritus.com" className="w-full bg-slate-900 border border-slate-700 p-3 rounded text-white focus:border-blue-500 outline-none transition-all" />
                        </div>
                        <div>
                            <label className="text-xs text-slate-400 mb-1 block">Password</label>
                            <input type="password" placeholder="••••••••" className="w-full bg-slate-900 border border-slate-700 p-3 rounded text-white focus:border-blue-500 outline-none transition-all" />
                        </div>
                        <button className="w-full bg-blue-600 py-3 rounded font-bold hover:bg-blue-700 transition shadow-lg shadow-blue-900/20 active:scale-[0.98]">
                            MASUK KE DASHBOARD
                        </button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
