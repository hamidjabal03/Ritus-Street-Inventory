<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ritus Street Inventory | Fix</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: #f8fafc; }
        .sidebar-dark { width: 280px; height: 100vh; position: fixed; background: #1e293b; border-right: 1px solid #334155; z-index: 50; }
        .content-area { margin-left: 280px; padding: 3rem; min-height: 100vh; }
        .card-ritus { background: #1e293b; border: 1px solid #334155; border-radius: 2rem; transition: transform 0.2s; }
        .card-ritus:hover { transform: translateY(-5px); }
        .login-overlay { background: #020617; position: fixed; inset: 0; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        input::-webkit-inner-spin-button { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, className = "w-5 h-5" }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        function App() {
            const [isAuth, setIsAuth] = useState(false);
            const [showPass, setShowPass] = useState(false);
            const [activeTab, setActiveTab] = useState('Overview');
            
            // Database State
            const [inventory, setInventory] = useState([]);
            const [logs, setLogs] = useState([]);

            const handleUpdate = (name, qty, category, info = "") => {
                if (!name || isNaN(qty)) return;
                setInventory(prev => {
                    const existing = prev.find(i => i.name === name && i.category === category && i.info === info);
                    if (existing) return prev.map(i => i === existing ? { ...i, qty: i.qty + qty } : i);
                    return [...prev, { id: Date.now(), name, qty, category, info }];
                });
                setLogs(prev => [{ id: Date.now(), name, qty, type: 'IN', category, info, date: new Date() }, ...prev]);
            };

            const adjust = (id, val) => {
                const item = inventory.find(i => i.id === id);
                if (val < 0 && item.qty + val < 0) return alert("Stok tidak cukup!");
                setInventory(prev => prev.map(i => i.id === id ? { ...i, qty: i.qty + val } : i));
                setLogs(prev => [{ id: Date.now(), name: item.name, qty: Math.abs(val), type: val > 0 ? 'IN' : 'OUT', category: item.category, date: new Date() }, ...prev]);
            };

            if (!isAuth) {
                return (
                    <div className="login-overlay">
                        <div className="w-full max-w-sm p-10 bg-slate-900 border border-slate-800 rounded-[2.5rem] shadow-2xl">
                            <h1 className="text-3xl font-black italic text-center mb-8 tracking-tighter text-white uppercase">Ritus Street</h1>
                            <div className="space-y-4">
                                <div className="relative">
                                    <input 
                                        type={showPass ? "text" : "password"} 
                                        placeholder="Password" 
                                        className="w-full bg-slate-800 border border-slate-700 p-4 rounded-2xl text-white outline-none focus:border-blue-500 font-bold" 
                                    />
                                    <button onClick={() => setShowPass(!showPass)} className="absolute right-4 top-4 text-slate-500 hover:text-white">
                                        <Icon name={showPass ? "eye-off" : "eye"} />
                                    </button>
                                </div>
                                <button onClick={() => setIsAuth(true)} className="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-2xl font-black uppercase text-xs tracking-widest text-white transition-all shadow-lg shadow-blue-900/20">Authorize</button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex">
                    {/* SIDEBAR DARK MODE ASLI */}
                    <aside className="sidebar-dark p-8 flex flex-col">
                        <h2 className="text-2xl font-black italic mb-12 tracking-tighter uppercase">Ritus<span className="text-blue-500">.</span></h2>
                        <nav className="space-y-2 flex-1">
                            {['Overview', 'Input Stok', 'Riwayat'].map(t => (
                                <button key={t} onClick={() => setActiveTab(t)} 
                                    className={`w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-bold text-sm transition-all ${activeTab === t ? 'bg-blue-600 text-white shadow-xl' : 'text-slate-400 hover:bg-slate-800'}`}>
                                    <Icon name={t === 'Overview' ? 'layout-grid' : t === 'Input Stok' ? 'plus-circle' : 'activity'} /> {t}
                                </button>
                            ))}
                        </nav>
                        <button onClick={() => setIsAuth(false)} className="py-4 bg-rose-900/20 text-rose-500 rounded-2xl font-black text-[10px] uppercase border border-rose-900/30">Sign Out</button>
                    </aside>

                    <main className="content-area flex-1">
                        <header className="mb-10">
                            <h1 className="text-4xl font-black uppercase tracking-tight">{activeTab}</h1>
                            <p className="text-slate-500 font-bold text-[10px] uppercase tracking-widest mt-1">Gudang Internal Ritus Street</p>
                        </header>

                        {activeTab === 'Overview' && (
                            <div className="space-y-12">
                                {/* BATCH APPAREL - DIKEMBALIKAN */}
                                <section>
                                    <div className="flex items-center gap-3 mb-6">
                                        <div className="w-2 h-8 bg-blue-600 rounded-full"></div>
                                        <h3 className="text-xl font-black uppercase tracking-tight text-slate-100 italic">Batch Apparel</h3>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                        {inventory.filter(i => i.category === 'Apparel').map(item => (
                                            <div key={item.id} className="card-ritus p-8 flex flex-col gap-4 shadow-xl">
                                                <div className="flex justify-between items-start">
                                                    <h4 className="font-black text-white text-lg uppercase leading-tight">{item.name} <span className="block text-[10px] text-blue-400 mt-1">{item.info}</span></h4>
                                                    <span className="bg-blue-600/20 text-blue-400 text-[8px] font-black px-3 py-1 rounded-full uppercase">Apparel</span>
                                                </div>
                                                <div className="flex items-baseline gap-2">
                                                    <span className="text-6xl font-black text-white">{item.qty}</span>
                                                    <span className="text-slate-500 font-black text-xs uppercase">Pcs</span>
                                                </div>
                                                <div className="flex gap-2 mt-4">
                                                    <button onClick={() => adjust(item.id, 1)} className="flex-1 bg-blue-600 py-3 rounded-xl font-black text-[10px] uppercase">In</button>
                                                    <button onClick={() => adjust(item.id, -1)} className="flex-1 bg-slate-800 py-3 rounded-xl font-black text-[10px] uppercase hover:bg-rose-600 transition-colors">Out</button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </section>

                                {/* TABEL KATEGORI LAIN */}
                                <section>
                                    <div className="flex items-center gap-3 mb-6 opacity-30">
                                        <div className="w-2 h-8 bg-slate-500 rounded-full"></div>
                                        <h3 className="text-xl font-black uppercase tracking-tight">Kategori Lain</h3>
                                    </div>
                                    <div className="card-ritus overflow-hidden shadow-2xl">
                                        <table className="w-full text-left">
                                            <thead className="bg-slate-800/50 text-[10px] font-black text-slate-500 uppercase tracking-widest">
                                                <tr><th className="p-6">Produk</th><th className="p-6">Kategori</th><th className="p-6">Stok</th><th className="p-6 text-right">Update</th></tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-800/50">
                                                {inventory.filter(i => i.category !== 'Apparel').map(item => (
                                                    <tr key={item.id} className="hover:bg-slate-800/30">
                                                        <td className="p-6 font-bold text-slate-200 uppercase">{item.name}</td>
                                                        <td className="p-6"><span className="px-3 py-1 bg-slate-800 text-slate-400 rounded-full text-[9px] font-black uppercase">{item.category}</span></td>
                                                        <td className="p-6 font-black text-2xl text-white">{item.qty}</td>
                                                        <td className="p-6 flex justify-end gap-2">
                                                            <button onClick={() => adjust(item.id, 1)} className="w-10 h-10 bg-blue-600/10 text-blue-400 rounded-xl flex items-center justify-center hover:bg-blue-600 hover:text-white transition-all"><Icon name="plus" /></button>
                                                            <button onClick={() => adjust(item.id, -1)} className="w-10 h-10 bg-rose-600/10 text-rose-400 rounded-xl flex items-center justify-center hover:bg-rose-600 hover:text-white transition-all"><Icon name="minus" /></button>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </section>
                            </div>
                        )}

                        {activeTab === 'Input Stok' && (
                            <div className="grid lg:grid-cols-2 gap-8">
                                <div className="card-ritus p-10 shadow-xl">
                                    <h3 className="text-[10px] font-black uppercase text-blue-400 mb-8 tracking-[0.3em]">Entry System</h3>
                                    <form onSubmit={(e) => { 
                                        e.preventDefault(); 
                                        const fd = new FormData(e.target); 
                                        handleUpdate(fd.get('n'), parseInt(fd.get('q')), fd.get('c'), fd.get('i')); 
                                        e.target.reset(); 
                                    }} className="space-y-6">
                                        <input name="n" required placeholder="Nama Produk" className="w-full bg-slate-800/50 border border-slate-700 p-4 rounded-2xl outline-none focus:border-blue-500 font-bold uppercase text-white" />
                                        <input name="i" placeholder="Info/Varian" className="w-full bg-slate-800/50 border border-slate-700 p-4 rounded-2xl outline-none focus:border-blue-500 font-bold uppercase text-xs text-white" />
                                        <div className="grid grid-cols-2 gap-4">
                                            <input name="q" type="number" required placeholder="Qty" className="w-full bg-slate-800/50 border border-slate-700 p-4 rounded-2xl outline-none focus:border-blue-500 font-bold text-white" />
                                            <select name="c" className="w-full bg-slate-800/50 border border-slate-700 p-4 rounded-2xl outline-none focus:border-blue-500 font-bold text-white">
                                                <option>Apparel</option><option>Aksesoris</option><option>Cans</option>
                                            </select>
                                        </div>
                                        <button className="w-full py-5 bg-blue-600 text-white rounded-2xl font-black uppercase text-xs tracking-widest shadow-lg">Submit Stock</button>
                                    </form>
                                </div>
                            </div>
                        )}

                        {activeTab === 'Riwayat' && (
                            <div className="card-ritus overflow-hidden">
                                <table className="w-full text-left text-sm">
                                    <thead className="bg-slate-800/50 text-[10px] font-black text-slate-500 uppercase">
                                        <tr><th className="p-6">Date</th><th className="p-6">Product</th><th className="p-6">Type</th><th className="p-6">Qty</th></tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-800/50">
                                        {logs.map(log => (
                                            <tr key={log.id}>
                                                <td className="p-6 text-slate-500">{log.date.toLocaleString()}</td>
                                                <td className="p-6 font-bold uppercase text-slate-200">{log.name}</td>
                                                <td className="p-6"><span className={`px-3 py-1 rounded-full text-[9px] font-black ${log.type === 'IN' ? 'bg-emerald-900/30 text-emerald-400' : 'bg-rose-900/30 text-rose-400'}`}>{log.type}</span></td>
                                                <td className="p-6 font-black text-xl text-white">{log.qty}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
