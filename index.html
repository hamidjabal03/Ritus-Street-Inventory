    <!-- <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"> -->

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [isLoaded, setIsLoaded] = useState(false);
            const [user, setUser] = useState(null);
            const [email, setEmail] = useState("");
            const [password, setPassword] = useState("");
            const [loading, setLoading] = useState(false);
            const [errorMessage, setErrorMessage] = useState("");

            useEffect(() => {
                const checkFirebase = setInterval(() => {
                    if (window.FirebaseReady) {
                        setIsLoaded(true);
                        window.RitusAuth.onAuthStateChanged((u) => setUser(u));
                        clearInterval(checkFirebase);
                    }
                }, 500);
                return () => clearInterval(checkFirebase);
            }, []);

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                setErrorMessage(""); // Reset pesan error setiap kali mencoba login
                
                try {
                    const { signInWithEmailAndPassword } = await import("https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js");
                    await signInWithEmailAndPassword(window.RitusAuth, email, password);
                } catch (error) {
                    console.error("Login Error:", error.code);
                    // Penanda kesalahan yang interaktif
                    if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password' || error.code === 'auth/invalid-credential') {
                        setErrorMessage("Email atau Password salah. Silakan coba lagi.");
                    } else {
                        setErrorMessage("Terjadi kesalahan sistem. Periksa koneksi Anda.");
                    }
                } finally {
                    setLoading(false);
                }
            };

            if (!isLoaded) return (
                <div className="min-h-screen flex items-center justify-center bg-[#0f172a]">
                    <div className="w-12 h-12 border-4 border-blue-500/20 border-t-blue-500 rounded-full animate-spin"></div>
                </div>
            );

            return (
                <div className="min-h-screen flex items-center justify-center p-4 bg-[radial-gradient(circle_at_top_left,_var(--tw-gradient-stops))] from-slate-900 via-[#0f172a] to-slate-900 font-['Inter',sans-serif]">
                    {user ? (
                        <div className="bg-white/10 backdrop-blur-xl p-10 rounded-2xl shadow-2xl border border-white/10 text-center max-w-sm w-full animate-in fade-in zoom-in duration-300">
                            <div className="w-20 h-20 bg-blue-500/20 rounded-full flex items-center justify-center mx-auto mb-6 border border-blue-500/30">
                                <svg className="w-10 h-10 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"></path></svg>
                            </div>
                            <h2 className="text-2xl font-bold text-white mb-2">Akses Diterima</h2>
                            <p className="text-slate-400 mb-8 text-sm">{user.email}</p>
                            <button 
                                onClick={() => window.RitusAuth.signOut()}
                                className="w-full bg-white/5 hover:bg-white/10 text-white py-3 rounded-xl font-semibold transition-all border border-white/10"
                            >
                                KELUAR SISTEM
                            </button>
                        </div>
                    ) : (
                        <div className="w-full max-w-md animate-in fade-in slide-in-from-bottom-8 duration-700">
                            <div className="text-center mb-8">
                                <h1 className="text-4xl font-extrabold text-white tracking-tighter mb-2">Ritus Street</h1>
                                <p className="text-slate-500 uppercase tracking-[0.4em] text-[10px] font-semibold">Inventory Control Panel</p>
                            </div>

                            <div className="bg-white/5 backdrop-blur-md p-8 rounded-3xl shadow-[0_20px_50px_rgba(0,0,0,0.3)] border border-white/10">
                                {errorMessage && (
                                    <div className="mb-6 p-4 bg-red-500/10 border border-red-500/20 rounded-xl flex items-center gap-3 animate-bounce-short">
                                        <svg className="w-5 h-5 text-red-500 shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clipRule="evenodd"></path></svg>
                                        <p className="text-red-400 text-xs font-medium">{errorMessage}</p>
                                    </div>
                                )}

                                <form onSubmit={handleLogin} className="space-y-5">
                                    <div className="group">
                                        <label className="text-[10px] font-bold text-slate-500 uppercase ml-1 mb-2 block group-focus-within:text-blue-400 transition-colors">Email Address</label>
                                        <input 
                                            type="email" 
                                            placeholder="admin@ritus.com" 
                                            value={email}
                                            onChange={(e) => setEmail(e.target.value)}
                                            className="w-full bg-white/5 border border-white/10 p-4 rounded-2xl focus:border-blue-500/50 focus:bg-white/10 outline-none transition-all text-white placeholder:text-slate-600" 
                                            required
                                        />
                                    </div>
                                    <div className="group">
                                        <label className="text-[10px] font-bold text-slate-500 uppercase ml-1 mb-2 block group-focus-within:text-blue-400 transition-colors">Security Password</label>
                                        <input 
                                            type="password" 
                                            placeholder="••••••••" 
                                            value={password}
                                            onChange={(e) => setPassword(e.target.value)}
                                            className="w-full bg-white/5 border border-white/10 p-4 rounded-2xl focus:border-blue-500/50 focus:bg-white/10 outline-none transition-all text-white placeholder:text-slate-600" 
                                            required
                                        />
                                    </div>
                                    
                                    <button 
                                        type="submit"
                                        disabled={loading}
                                        className={`w-full py-4 rounded-2xl font-bold text-sm tracking-widest transition-all shadow-lg active:scale-[0.97] ${
                                            loading 
                                            ? 'bg-slate-700 text-slate-400 cursor-not-allowed' 
                                            : 'bg-blue-600 hover:bg-blue-500 text-white shadow-blue-900/20 hover:shadow-blue-500/20'
                                        }`}
                                    >
                                        {loading ? 'VERIFYING...' : 'ACCESS SYSTEM'}
                                    </button>
                                </form>
                            </div>
                            <p className="text-center mt-8 text-slate-600 text-[10px] uppercase tracking-widest">Authorized Personnel Only</p>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
