<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ritus Street Inventory</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f172a] text-white">

    <div id="root">
        <!-- Tampilan Loading Awal -->
        <div class="min-h-screen flex items-center justify-center">
            <div class="text-center">
                <div class="w-12 h-12 border-4 border-blue-500/20 border-t-blue-500 rounded-full animate-spin mx-auto mb-4"></div>
                <p class="text-slate-400 animate-pulse">Menghubungkan ke Ritus System...</p>
            </div>
        </div>
    </div>

    <!-- 1. Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

    <!-- 2. Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB2xfDX5PU_nP5TEPSYFL6xmBcS0wZrj_c",
            authDomain: "ritus-street-inventory.firebaseapp.com",
            projectId: "ritus-street-inventory",
            storageBucket: "ritus-street-inventory.firebasestorage.app",
            messagingSenderId: "249697895281",
            appId: "1:249697895281:web:c44bccdd16958c9d28ecd0",
            measurementId: "G-MMTVPVB24E"
        };

        const app = initializeApp(firebaseConfig);
        window.RitusAuth = getAuth(app);
        window.RitusDB = getFirestore(app);
        window.FirebaseReady = true;
    </script>

    <!-- 3. Logic Aplikasi -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [isLoaded, setIsLoaded] = useState(false);
            const [user, setUser] = useState(null);

            useEffect(() => {
                const checkFirebase = setInterval(() => {
                    if (window.FirebaseReady) {
                        setIsLoaded(true);
                        // Cek status login
                        import("https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js").then((authMod) => {
                            authMod.onAuthStateChanged(window.RitusAuth, (u) => setUser(u));
                        });
                        clearInterval(checkFirebase);
                    }
                }, 500);
                return () => clearInterval(checkFirebase);
            }, []);

            if (!isLoaded) return (
                <div class="min-h-screen flex items-center justify-center">
                    <div class="text-center">
                        <div class="w-10 h-10 border-4 border-blue-500/20 border-t-blue-500 rounded-full animate-spin mx-auto mb-4"></div>
                        <p class="text-slate-500">Syncing Data...</p>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="bg-slate-800 p-8 rounded-xl shadow-2xl border border-slate-700 w-full max-w-md">
                        <h2 className="text-2xl font-bold text-center mb-2">Ritus Street</h2>
                        <p className="text-center text-slate-400 text-xs mb-8 uppercase tracking-widest font-mono">Inventory Access</p>
                        
                        <div className="space-y-4">
                            <input type="email" placeholder="Email Admin" className="w-full bg-slate-900 border border-slate-700 p-3 rounded focus:border-blue-500 outline-none transition-all" />
                            <input type="password" placeholder="Password" className="w-full bg-slate-900 border border-slate-700 p-3 rounded focus:border-blue-500 outline-none transition-all" />
                            <button className="w-full bg-blue-600 py-3 rounded font-bold hover:bg-blue-700 transition active:scale-95">
                                LOGIN SYSTEM
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
