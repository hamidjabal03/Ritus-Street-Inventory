<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ritus Street Inventory - Apparel & Aksesoris</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .modal-animate { animation: zoomIn 0.15s ease-out; }
        @keyframes zoomIn { from { transform: scale(0.98); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .tab-content { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .sidebar-transition { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <!-- React and Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase SDKs using standard script tags for better preview compatibility -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, addDoc, deleteDoc, query } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Expose Firebase to window for React component access
        window.FB = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore, collection, doc, setDoc, onSnapshot, addDoc, deleteDoc, query };
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const firebaseConfig = { 
            apiKey: "AIzaSyB2xfDX5PU_nP5TEPSYFL6xmBcS0wZrj_c", 
            authDomain: "ritus-street-inventory.firebaseapp.com", 
            projectId: "ritus-street-inventory", 
            storageBucket: "ritus-street-inventory.firebasestorage.app", 
            messagingSenderId: "249697895281", 
            appId: "1:1032338604753:web:96e87f17b660c6d649887f" 
        };

        const appId = 'ritus-street-v2';

        function App() {
            const [user, setUser] = useState(null);
            const [inventory, setInventory] = useState([]);
            const [transactions, setTransactions] = useState([]);
            const [loading, setLoading] = useState(true);
            const [tab, setTab] = useState('inventory');
            const [categoryFilter, setCategoryFilter] = useState('apparel');
            const [showModal, setShowModal] = useState(null);
            const [selectedItem, setSelectedItem] = useState(null);
            const [selectedSize, setSelectedSize] = useState(null);
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);
            const [db, setDb] = useState(null);
            const [auth, setAuth] = useState(null);

            // 1. Initialize Firebase
            useEffect(() => {
                const checkFB = setInterval(() => {
                    if (window.FB) {
                        clearInterval(checkFB);
                        const app = window.FB.initializeApp(firebaseConfig);
                        const fbAuth = window.FB.getAuth(app);
                        const fbDb = window.FB.getFirestore(app);
                        setAuth(fbAuth);
                        setDb(fbDb);

                        window.FB.signInAnonymously(fbAuth).catch(console.error);
                        window.FB.onAuthStateChanged(fbAuth, (u) => {
                            if (u) {
                                setUser(u);
                                setLoading(false);
                            }
                        });
                    }
                }, 100);
                return () => clearInterval(checkFB);
            }, []);

            // 2. Data Listeners
            useEffect(() => {
                if (!user || !db) return;

                const unsubInv = window.FB.onSnapshot(
                    window.FB.collection(db, 'artifacts', appId, 'public', 'data', 'inventory'), 
                    (snap) => {
                        setInventory(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                        setTimeout(() => { if(window.lucide) window.lucide.createIcons(); }, 100);
                    },
                    (err) => console.error("Inv listener error:", err)
                );

                const unsubTrans = window.FB.onSnapshot(
                    window.FB.collection(db, 'artifacts', appId, 'public', 'data', 'transactions'), 
                    (snap) => {
                        const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                        setTransactions(data.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp)));
                    },
                    (err) => console.error("Trans listener error:", err)
                );

                return () => { unsubInv(); unsubTrans(); };
            }, [user, db]);

            // Icons refresh on tab change
            useEffect(() => {
                if(window.lucide) window.lucide.createIcons();
            }, [tab, isSidebarOpen, showModal, categoryFilter]);

            const handleUpdateStock = async (e) => {
                e.preventDefault();
                const amount = parseInt(e.target.amount.value);
                const type = e.target.type.value;
                let updatedData = { ...selectedItem };

                if (selectedItem.category === 'apparel') {
                    const currentStock = selectedItem.sizes[selectedSize] || 0;
                    const newStock = type === 'in' ? currentStock + amount : currentStock - amount;
                    if (newStock < 0) return;
                    updatedData.sizes[selectedSize] = newStock;
                } else {
                    const newStock = type === 'in' ? selectedItem.stock + amount : selectedItem.stock - amount;
                    if (newStock < 0) return;
                    updatedData.stock = newStock;
                }

                await window.FB.setDoc(window.FB.doc(db, 'artifacts', appId, 'public', 'data', 'inventory', selectedItem.id), updatedData, { merge: true });
                await window.FB.addDoc(window.FB.collection(db, 'artifacts', appId, 'public', 'data', 'transactions'), {
                    itemName: selectedItem.name, 
                    info: selectedItem.category === 'apparel' ? selectedSize : '-',
                    type, amount, timestamp: new Date().toISOString()
                });
                setShowModal(null);
            };

            const toggleSidebar = () => setIsSidebarOpen(!isSidebarOpen);

            if (loading) return (
                <div className="h-screen flex items-center justify-center bg-slate-900 text-white flex-col gap-4">
                    <div className="w-12 h-12 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
                    <p className="font-black italic uppercase text-[10px] tracking-widest animate-pulse">Menghubungkan Cloud...</p>
                </div>
            );

            return (
                <div className="min-h-screen bg-slate-50">
                    {/* SIDEBAR */}
                    <div className={`fixed inset-y-0 left-0 w-80 bg-slate-900 text-white z-[150] sidebar-transition transform ${isSidebarOpen ? 'translate-x-0 shadow-2xl' : '-translate-x-full'} flex flex-col`}>
                        <div className="p-8 flex items-center justify-between border-b border-slate-800">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/20">
                                    <i data-lucide="layout-grid" className="text-white" size="20"></i>
                                </div>
                                <span className="font-black italic uppercase tracking-tighter text-lg">Main Menu</span>
                            </div>
                            <button onClick={toggleSidebar} className="p-2 hover:bg-slate-800 rounded-lg transition-colors">
                                <i data-lucide="x" size="20"></i>
                            </button>
                        </div>
                        <nav className="p-6 space-y-2 flex-1">
                            <button onClick={() => { setTab('inventory'); toggleSidebar(); }} className={`w-full flex items-center gap-4 p-4 rounded-2xl font-black text-[10px] uppercase tracking-widest transition-all ${tab === 'inventory' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}>
                                <i data-lucide="package" size="18"></i> Manajemen Stok
                            </button>
                            <button onClick={() => { setTab('history'); toggleSidebar(); }} className={`w-full flex items-center gap-4 p-4 rounded-2xl font-black text-[10px] uppercase tracking-widest transition-all ${tab === 'history' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}>
                                <i data-lucide="history" size="18"></i> Riwayat Transaksi
                            </button>
                        </nav>
                        <div className="p-8 bg-slate-950/50 border-t border-slate-800">
                            <div className="flex items-center gap-3">
                                <div className="w-8 h-8 bg-slate-800 rounded-full flex items-center justify-center text-slate-400"><i data-lucide="user" size="14"></i></div>
                                <div className="overflow-hidden">
                                    <p className="text-[8px] font-black uppercase text-slate-500 mb-1">Authenticated</p>
                                    <p className="text-[10px] font-bold italic truncate text-slate-300">{user?.uid}</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    {isSidebarOpen && <div onClick={toggleSidebar} className="fixed inset-0 bg-slate-950/60 backdrop-blur-sm z-[140]"></div>}

                    {/* TOP NAVBAR */}
                    <nav className="bg-white/90 backdrop-blur-md border-b h-20 px-6 flex items-center justify-between sticky top-0 z-50">
                        <div className="flex items-center gap-4">
                            <button onClick={toggleSidebar} className="w-12 h-12 flex items-center justify-center bg-slate-100 rounded-2xl hover:bg-indigo-600 hover:text-white transition-all">
                                <i data-lucide="menu" size="24"></i>
                            </button>
                            <h1 className="font-black italic uppercase tracking-tighter text-2xl">
                                RITUS <span className="text-indigo-600">STREET</span>
                            </h1>
                        </div>
                        <div className="flex items-center gap-2 px-4 py-2 bg-emerald-50 text-emerald-600 rounded-full border border-emerald-100">
                            <div className="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
                            <span className="text-[9px] font-black uppercase italic tracking-widest">Connected</span>
                        </div>
                    </nav>

                    <main className="max-w-6xl mx-auto p-6 tab-content">
                        {tab === 'inventory' ? (
                            <>
                                <div className="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
                                    <div className="flex bg-white p-1.5 rounded-[1.5rem] border border-slate-200 w-full md:w-auto shadow-sm">
                                        <button onClick={() => setCategoryFilter('apparel')} className={`flex-1 md:flex-none px-8 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest transition-all ${categoryFilter === 'apparel' ? 'bg-slate-900 text-white shadow-lg shadow-slate-900/20' : 'text-slate-400'}`}>Apparel</button>
                                        <button onClick={() => setCategoryFilter('aksesoris')} className={`flex-1 md:flex-none px-8 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest transition-all ${categoryFilter === 'aksesoris' ? 'bg-slate-900 text-white shadow-lg shadow-slate-900/20' : 'text-slate-400'}`}>Aksesoris</button>
                                    </div>
                                    <button onClick={() => setShowModal('add')} className="w-full md:w-auto bg-indigo-600 text-white px-8 py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest flex items-center justify-center gap-2 hover:bg-indigo-700 transition-all shadow-xl shadow-indigo-500/20">
                                        <i data-lucide="plus" size="16"></i> Tambah {categoryFilter}
                                    </button>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                    {inventory.filter(i => i.category === categoryFilter).map(item => (
                                        <div key={item.id} className="bg-white p-8 rounded-[2.5rem] border border-slate-200 shadow-sm relative group hover:border-indigo-400 transition-all">
                                            <div className="flex justify-between items-start mb-6">
                                                <h3 className="font-black italic uppercase text-xl leading-tight tracking-tighter">{item.name}</h3>
                                                <button onClick={async () => {if(confirm("Hapus artikel ini?")) await window.FB.deleteDoc(window.FB.doc(db, 'artifacts', appId, 'public', 'data', 'inventory', item.id))}} className="text-slate-200 hover:text-rose-500 transition-colors">
                                                    <i data-lucide="trash-2" size="18"></i>
                                                </button>
                                            </div>

                                            {item.category === 'apparel' ? (
                                                <div className="grid grid-cols-2 gap-4">
                                                    {Object.entries(item.sizes || {}).map(([size, stock]) => (
                                                        <div key={size} className="bg-slate-50 p-4 rounded-2xl border border-slate-100 flex justify-between items-center group/size hover:bg-indigo-50/50 transition-all">
                                                            <div>
                                                                <p className="text-[9px] font-black text-slate-400 uppercase italic mb-1">{size}</p>
                                                                <p className="text-2xl font-black italic">{stock}</p>
                                                            </div>
                                                            <div className="flex flex-col gap-1 opacity-0 group-hover/size:opacity-100">
                                                                <button onClick={() => {setSelectedItem(item); setSelectedSize(size); setShowModal('in');}} className="p-1.5 bg-emerald-500 text-white rounded-lg hover:scale-110"><i data-lucide="plus" size="12"></i></button>
                                                                <button onClick={() => {setSelectedItem(item); setSelectedSize(size); setShowModal('out');}} className="p-1.5 bg-rose-500 text-white rounded-lg hover:scale-110"><i data-lucide="minus" size="12"></i></button>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            ) : (
                                                <div className="flex justify-between items-end">
                                                    <div>
                                                        <p className="text-[10px] font-black text-slate-400 uppercase italic">Total Stok</p>
                                                        <p className="text-6xl font-black italic tracking-tighter leading-none">{item.stock}</p>
                                                    </div>
                                                    <div className="flex gap-2">
                                                        <button onClick={() => {setSelectedItem(item); setShowModal('in');}} className="w-12 h-12 bg-emerald-500 text-white rounded-2xl flex items-center justify-center hover:scale-110 transition-all"><i data-lucide="plus" size="20"></i></button>
                                                        <button onClick={() => {setSelectedItem(item); setShowModal('out');}} className="w-12 h-12 bg-rose-500 text-white rounded-2xl flex items-center justify-center hover:scale-110 transition-all"><i data-lucide="minus" size="20"></i></button>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            </>
                        ) : (
                            <div className="bg-white rounded-[2rem] border border-slate-200 overflow-hidden shadow-sm">
                                <div className="p-6 border-b flex justify-between items-center bg-slate-50/50">
                                    <h2 className="font-black italic uppercase text-sm tracking-tight">Riwayat Transaksi Cloud</h2>
                                    <span className="text-[9px] font-black uppercase bg-white px-3 py-1 rounded-full border border-slate-200">{transactions.length} Entri</span>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left">
                                        <thead className="bg-slate-50 text-[10px] font-black uppercase text-slate-400 italic">
                                            <tr><th className="p-6">Waktu</th><th className="p-6">Artikel</th><th className="p-6">Info</th><th className="p-6">Tipe</th><th className="p-6 text-right">Qty</th></tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100 italic font-bold text-xs uppercase">
                                            {transactions.map(t => (
                                                <tr key={t.id} className="hover:bg-slate-50">
                                                    <td className="p-6 text-slate-400">{new Date(t.timestamp).toLocaleTimeString('id-ID')}</td>
                                                    <td className="p-6">{t.itemName}</td>
                                                    <td className="p-6"><span className="bg-slate-100 px-2 py-1 rounded text-[9px]">{t.info}</span></td>
                                                    <td className={`p-6 font-black text-[9px] ${t.type === 'in' ? 'text-emerald-500' : 'text-rose-500'}`}>{t.type === 'in' ? 'MASUK' : 'KELUAR'}</td>
                                                    <td className={`p-6 text-right font-black ${t.type === 'in' ? 'text-emerald-500' : 'text-rose-500'}`}>{t.type === 'in' ? '+' : '-'}{t.amount}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                    </main>

                    {showModal && (
                        <div className="fixed inset-0 bg-slate-900/70 backdrop-blur-md z-[200] flex items-center justify-center p-4">
                            <div className="bg-white rounded-[3rem] w-full max-w-sm p-10 modal-animate shadow-2xl relative">
                                <button onClick={() => setShowModal(null)} className="absolute right-8 top-8 text-slate-300 hover:text-slate-900 transition-colors">
                                    <i data-lucide="x" size="24"></i>
                                </button>
                                {showModal === 'add' ? (
                                    <form onSubmit={async (e) => {
                                        e.preventDefault();
                                        const name = e.target.name.value;
                                        if (categoryFilter === 'apparel') {
                                            const sizes = { S: parseInt(e.target.s.value || 0), M: parseInt(e.target.m.value || 0), L: parseInt(e.target.l.value || 0), XL: parseInt(e.target.xl.value || 0) };
                                            await window.FB.addDoc(window.FB.collection(db, 'artifacts', appId, 'public', 'data', 'inventory'), { name, category: 'apparel', sizes, createdAt: new Date().toISOString() });
                                        } else {
                                            await window.FB.addDoc(window.FB.collection(db, 'artifacts', appId, 'public', 'data', 'inventory'), { name, category: 'aksesoris', stock: parseInt(e.target.stock.value || 0), createdAt: new Date().toISOString() });
                                        }
                                        setShowModal(null);
                                    }}>
                                        <h2 className="text-2xl font-black italic uppercase mb-8 tracking-tighter underline decoration-indigo-500 decoration-4">Tambah Artikel</h2>
                                        <div className="space-y-4">
                                            <input name="name" placeholder="NAMA ARTIKEL" required className="w-full p-4 bg-slate-50 rounded-2xl border border-slate-200 font-bold uppercase text-xs focus:border-indigo-500 outline-none" />
                                            {categoryFilter === 'apparel' ? (
                                                <div className="grid grid-cols-2 gap-3">
                                                    {['S', 'M', 'L', 'XL'].map(s => (
                                                        <div key={s}><label className="text-[8px] font-black uppercase text-slate-400 ml-2">Size {s}</label><input name={s.toLowerCase()} type="number" defaultValue="0" className="w-full p-4 bg-slate-50 rounded-2xl border border-slate-200 font-bold text-xs" /></div>
                                                    ))}
                                                </div>
                                            ) : (
                                                <div><label className="text-[8px] font-black uppercase text-slate-400 ml-2">Stok Awal</label><input name="stock" type="number" defaultValue="0" className="w-full p-4 bg-slate-50 rounded-2xl border border-slate-200 font-bold text-xs" /></div>
                                            )}
                                            <button type="submit" className="w-full py-5 bg-indigo-600 text-white font-black rounded-2xl uppercase italic tracking-widest text-[10px] shadow-lg shadow-indigo-500/30">Upload ke Cloud</button>
                                        </div>
                                    </form>
                                ) : (
                                    <form onSubmit={handleUpdateStock} className="text-center">
                                        <input type="hidden" name="type" value={showModal} />
                                        <h2 className={`text-2xl font-black italic uppercase mb-2 ${showModal === 'in' ? 'text-emerald-500' : 'text-rose-500'}`}>{showModal === 'in' ? 'Stok Masuk' : 'Stok Keluar'}</h2>
                                        <p className="text-[10px] font-black text-slate-400 uppercase italic mb-8">{selectedItem?.name} {selectedSize && `(${selectedSize})`}</p>
                                        <input name="amount" type="number" required min="1" autoFocus placeholder="0" className="w-full text-center text-8xl font-black italic bg-transparent outline-none mb-10 tracking-tighter" />
                                        <button type="submit" className={`w-full py-5 text-white font-black rounded-2xl uppercase italic tracking-widest text-[10px] shadow-xl ${showModal === 'in' ? 'bg-emerald-500 shadow-emerald-200' : 'bg-rose-500 shadow-rose-200'}`}>Simpan Cloud</button>
                                    </form>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
