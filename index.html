<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ritus Street Inventory</title>
    
    <!-- Library Loaders -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB2xfDX5PU_nP5TEPSYFL6xmBcS0wZrj_c",
            authDomain: "ritus-street-inventory.firebaseapp.com",
            projectId: "ritus-street-inventory",
            storageBucket: "ritus-street-inventory.firebasestorage.app",
            messagingSenderId: "249697895281",
            appId: "1:249697895281:web:c44bccdd16958c9d28ecd0"
        };

        const app = initializeApp(firebaseConfig);
        window.RitusAuth = getAuth(app);
        window.FirebaseReady = true;
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .error-shake { animation: shake 0.2s ease-in-out 0s 2; }
    </style>
</head>
<body class="bg-[#020617] text-slate-200">

    <div id="root">
        <div class="min-h-screen flex items-center justify-center">
            <div class="text-center">
                <div class="w-8 h-8 border-2 border-blue-500/20 border-t-blue-500 rounded-full animate-spin mx-auto mb-4"></div>
                <p class="text-[10px] tracking-[0.3em] text-slate-500 uppercase">System Loading...</p>
            </div>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [ready, setReady] = useState(false);
            const [user, setUser] = useState(null);
            const [email, setEmail] = useState('');
            const [pass, setPass] = useState('');
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');

            useEffect(() => {
                const check = setInterval(() => {
                    if (window.FirebaseReady && window.RitusAuth) {
                        setReady(true);
                        window.RitusAuth.onAuthStateChanged(u => setUser(u));
                        clearInterval(check);
                    }
                }, 500);
                return () => clearInterval(check);
            }, []);

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError('');
                
                try {
                    const { signInWithEmailAndPassword } = await import("https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js");
                    await signInWithEmailAndPassword(window.RitusAuth, email, pass);
                } catch (err) {
                    setError("Akses Ditolak: Email atau Password salah.");
                    console.error(err.code);
                } finally {
                    setLoading(false);
                }
            };

            if (!ready) return null;

            return (
                <div className="min-h-screen flex items-center justify-center p-6 bg-[radial-gradient(circle_at_top,_var(--tw-gradient-stops))] from-slate-900 via-slate-950 to-black">
                    {user ? (
                        <div className="w-full max-w-md p-10 rounded-[2.5rem] glass border border-white/10 text-center shadow-2xl animate-in fade-in zoom-in duration-500">
                            <div className="w-20 h-20 bg-green-500/10 border border-green-500/20 rounded-full flex items-center justify-center mx-auto mb-6">
                                <svg className="w-10 h-10 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"></path></svg>
                            </div>
                            <h1 className="text-2xl font-extrabold text-white mb-2">Sistem Aktif</h1>
                            <p className="text-slate-400 text-sm mb-8">{user.email}</p>
                            <button onClick={() => window.RitusAuth.signOut()} className="w-full py-4 rounded-2xl bg-white/5 hover:bg-red-500/10 hover:text-red-500 border border-white/10 transition-all font-bold">KELUAR</button>
                        </div>
                    ) : (
                        <div className="w-full max-w-sm animate-in fade-in slide-in-from-bottom-4 duration-700">
                            <div className="text-center mb-10">
                                <h2 className="text-4xl font-black tracking-tighter text-white italic italic">RITUS STREET</h2>
                                <p className="text-blue-500 text-[10px] tracking-[0.4em] font-bold uppercase mt-2">Inventory Management</p>
                            </div>

                            <div className="glass p-8 rounded-[2.5rem] border border-white/10 shadow-2xl">
                                {error && (
                                    <div className="mb-6 p-4 bg-red-500/10 border border-red-500/20 rounded-2xl flex items-center gap-3 error-shake">
                                        <div className="w-2 h-2 bg-red-500 rounded-full animate-pulse"></div>
                                        <p className="text-red-400 text-[11px] font-semibold uppercase tracking-wider">{error}</p>
                                    </div>
                                )}

                                <form onSubmit={handleLogin} className="space-y-4">
                                    <div>
                                        <label className="text-[10px] font-bold text-slate-500 uppercase ml-2 mb-2 block">Identity</label>
                                        <input 
                                            type="email" 
                                            placeholder="admin@ritus.com" 
                                            onChange={e => setEmail(e.target.value)} 
                                            className="w-full bg-slate-800/50 border border-white/5 p-4 rounded-2xl outline-none focus:border-blue-500/50 focus:bg-slate-800 transition-all text-white" 
                                            required 
                                        />
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-bold text-slate-500 uppercase ml-2 mb-2 block">Security Code</label>
                                        <input 
                                            type="password" 
                                            placeholder="••••••••" 
                                            onChange={e => setPass(e.target.value)} 
                                            className="w-full bg-slate-800/50 border border-white/5 p-4 rounded-2xl outline-none focus:border-blue-500/50 focus:bg-slate-800 transition-all text-white" 
                                            required 
                                        />
                                    </div>
                                    <button 
                                        disabled={loading}
                                        className="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-extrabold text-sm tracking-[0.2em] shadow-lg shadow-blue-600/20 active:scale-[0.98] transition-all disabled:opacity-50"
                                    >
                                        {loading ? 'VERIFYING...' : 'LOGIN SYSTEM'}
                                    </button>
                                </form>
                            </div>
                            <p className="text-center mt-8 text-slate-600 text-[10px] tracking-widest font-bold uppercase">Authorized Personnel Only</p>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
