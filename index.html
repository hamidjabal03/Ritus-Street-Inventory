<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ritus Street Inventory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #F8FAFC;
            color: #0F172A;
        }

        .ritus-card { 
            border-radius: 2.5rem; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(0,0,0,0.05);
        }
        
        .ritus-card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1); 
            border-color: #6366f1;
        }

        .glass-header { 
            background: rgba(255, 255, 255, 0.8); 
            backdrop-filter: blur(12px); 
            border-bottom: 1px solid rgba(0,0,0,0.05); 
        }

        #loading-overlay {
            position: fixed; inset: 0; background: #0F172A; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; transition: opacity 0.5s ease;
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none; margin: 0;
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading-overlay">
        <div class="w-12 h-12 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="text-[10px] font-black uppercase tracking-[0.3em] animate-pulse">RITUS CLOUD CONNECTING</p>
        <button id="bypass-btn" class="mt-8 text-[9px] text-slate-500 underline hidden">MASUK MANUAL (BYPASS)</button>
    </div>

    <div id="root"></div>

    <!-- Firebase System -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        setTimeout(() => {
            const btn = document.getElementById('bypass-btn');
            if(btn) btn.classList.remove('hidden');
        }, 4000);

        try {
            const config = JSON.parse(__firebase_config || '{}');
            const app = initializeApp(config);
            const auth = getAuth(app);
            const db = getFirestore(app);
            
            window.RitusFirebase = { auth, db, collection, doc, setDoc, onSnapshot, addDoc, deleteDoc, signInAnonymously, onAuthStateChanged };
        } catch (e) {
            console.error("Firebase Error", e);
        }
    </script>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [inventory, setInventory] = useState([]);
            const [transactions, setTransactions] = useState([]);
            const [tab, setTab] = useState('inventory');
            const [search, setSearch] = useState('');
            const [showModal, setShowModal] = useState(null);
            const [selectedItem, setSelectedItem] = useState(null);
            
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'ritus-street-v1';

            useEffect(() => {
                const interval = setInterval(() => {
                    if (window.RitusFirebase) {
                        const { auth, signInAnonymously, onAuthStateChanged, db, collection, onSnapshot } = window.RitusFirebase;
                        
                        signInAnonymously(auth).catch(console.error);
                        
                        onAuthStateChanged(auth, (user) => {
                            if (user) {
                                document.getElementById('loading-overlay').style.opacity = '0';
                                setTimeout(() => document.getElementById('loading-overlay')?.remove(), 500);

                                const invRef = collection(db, 'artifacts', appId, 'public', 'data', 'inventory');
                                const transRef = collection(db, 'artifacts', appId, 'public', 'data', 'transactions');

                                onSnapshot(invRef, (s) => setInventory(s.docs.map(d => ({id: d.id, ...d.data()}))));
                                onSnapshot(transRef, (s) => setTransactions(s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp))));
                            }
                        });
                        clearInterval(interval);
                    }
                }, 500);

                document.getElementById('bypass-btn')?.addEventListener('click', () => {
                    document.getElementById('loading-overlay')?.remove();
                });

                return () => clearInterval(interval);
            }, []);

            useEffect(() => { if(window.lucide) window.lucide.createIcons(); }, [tab, inventory]);

            const handleUpdateStock = async (e) => {
                e.preventDefault();
                const amount = parseInt(e.target.amount.value);
                const type = showModal === 'in' ? 'in' : 'out';
                const newStock = type === 'in' ? (selectedItem.stock || 0) + amount : (selectedItem.stock || 0) - amount;

                if(newStock < 0) return alert("Stok tidak cukup!");

                const { db, doc, setDoc, addDoc, collection } = window.RitusFirebase;
                
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'inventory', selectedItem.id), {
                    ...selectedItem, stock: newStock
                }, { merge: true });

                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'transactions'), {
                    itemId: selectedItem.id,
                    itemName: selectedItem.name,
                    size: selectedItem.size,
                    type,
                    amount,
                    timestamp: new Date().toISOString()
                });

                setShowModal(null);
            };

            return (
                <div className="min-h-screen flex flex-col md:flex-row">
                    {/* Navigation Sidebar */}
                    <div className="w-full md:w-64 bg-slate-900 text-white p-8 flex flex-col shrink-0">
                        <div className="mb-12 flex items-center gap-3">
                            <div className="w-10 h-10 bg-indigo-600 rounded-2xl flex items-center justify-center font-black italic text-xl">R</div>
                            <h1 className="font-black italic text-2xl tracking-tighter">RITUS</h1>
                        </div>
                        
                        <nav className="space-y-3 flex-1">
                            {[
                                { id: 'inventory', icon: 'package', label: 'STOK BARANG' },
                                { id: 'history', icon: 'clock', label: 'RIWAYAT' }
                            ].map(item => (
                                <button 
                                    key={item.id}
                                    onClick={() => setTab(item.id)}
                                    className={`w-full flex items-center gap-4 p-4 rounded-2xl text-[10px] font-black tracking-widest transition-all ${tab === item.id ? 'bg-indigo-600 shadow-lg shadow-indigo-500/20' : 'text-slate-500 hover:text-white'}`}
                                >
                                    <i data-lucide={item.icon} className="w-4 h-4"></i>
                                    {item.label}
                                </button>
                            ))}
                        </nav>

                        <div className="mt-auto pt-8 border-t border-slate-800">
                            <p className="text-[8px] font-black text-slate-500 tracking-[0.2em]">CLOUD STATUS: <span className="text-emerald-500 underline">ONLINE</span></p>
                        </div>
                    </div>

                    {/* Main Content */}
                    <div className="flex-1 flex flex-col h-screen overflow-hidden">
                        <header className="glass-header h-24 px-8 flex items-center justify-between shrink-0">
                            <div className="relative w-full max-w-md">
                                <i data-lucide="search" className="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                                <input 
                                    type="text" 
                                    placeholder="CARI ARTIKEL..."
                                    className="w-full pl-12 pr-4 py-3 bg-slate-100 rounded-2xl text-[10px] font-black outline-none focus:ring-2 ring-indigo-500/20"
                                    value={search}
                                    onChange={(e) => setSearch(e.target.value)}
                                />
                            </div>
                            <div className="flex items-center gap-4">
                                <div className="text-right hidden md:block">
                                    <p className="text-[10px] font-black italic">RITUS ADMIN</p>
                                    <p className="text-[8px] font-bold text-slate-400 uppercase">Warehouse 01</p>
                                </div>
                                <div className="w-12 h-12 bg-slate-200 rounded-full border-2 border-white shadow-sm overflow-hidden">
                                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Ritus" alt="avatar" />
                                </div>
                            </div>
                        </header>

                        <main className="flex-1 overflow-y-auto p-8 bg-[#F8FAFC]">
                            {tab === 'inventory' ? (
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                                    {inventory.filter(i => i.name.toLowerCase().includes(search.toLowerCase())).map(item => (
                                        <div key={item.id} className="ritus-card bg-white p-8 flex flex-col">
                                            <div className="flex justify-between items-start mb-6">
                                                <span className="text-[10px] font-black bg-slate-100 px-3 py-1 rounded-full uppercase tracking-widest text-slate-500 italic">
                                                    Size {item.size || 'ALL'}
                                                </span>
                                                <i data-lucide="more-horizontal" className="w-4 h-4 text-slate-300"></i>
                                            </div>
                                            
                                            <h3 className="text-2xl font-black italic uppercase leading-none mb-2 tracking-tight">{item.name}</h3>
                                            <p className="text-[9px] font-bold text-slate-400 mb-8 uppercase tracking-widest">{item.category || 'Apparel'}</p>
                                            
                                            <div className="mt-auto flex items-end justify-between">
                                                <div>
                                                    <p className="text-[8px] font-black text-slate-300 uppercase mb-1">Stock Available</p>
                                                    <p className="text-5xl font-black italic tracking-tighter text-slate-900">{item.stock || 0}</p>
                                                </div>
                                                <div className="flex gap-2">
                                                    <button onClick={() => {setSelectedItem(item); setShowModal('in')}} className="w-10 h-10 bg-indigo-600 text-white rounded-xl flex items-center justify-center hover:bg-indigo-700 transition-colors shadow-lg shadow-indigo-500/30">
                                                        <i data-lucide="plus" className="w-5 h-5"></i>
                                                    </button>
                                                    <button onClick={() => {setSelectedItem(item); setShowModal('out')}} className="w-10 h-10 bg-slate-900 text-white rounded-xl flex items-center justify-center hover:bg-black transition-colors shadow-lg shadow-slate-900/20">
                                                        <i data-lucide="minus" className="w-5 h-5"></i>
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            ) : (
                                <div className="bg-white rounded-[2.5rem] border border-slate-100 shadow-sm overflow-hidden">
                                    <table className="w-full text-left">
                                        <thead className="bg-slate-50">
                                            <tr>
                                                <th className="px-8 py-6 text-[10px] font-black uppercase text-slate-400 tracking-widest">Artikel / Waktu</th>
                                                <th className="px-8 py-6 text-[10px] font-black uppercase text-slate-400 tracking-widest">Tipe</th>
                                                <th className="px-8 py-6 text-[10px] font-black uppercase text-slate-400 tracking-widest text-right">Qty</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-50">
                                            {transactions.map(t => (
                                                <tr key={t.id} className="hover:bg-slate-50/50 transition-colors">
                                                    <td className="px-8 py-6">
                                                        <p className="font-black italic text-sm uppercase tracking-tight">{t.itemName} <span className="text-slate-300 ml-1">({t.size})</span></p>
                                                        <p className="text-[9px] font-bold text-slate-400 mt-1">{new Date(t.timestamp).toLocaleString('id-ID')}</p>
                                                    </td>
                                                    <td className="px-8 py-6">
                                                        <span className={`px-4 py-1.5 rounded-full text-[9px] font-black italic uppercase tracking-widest ${t.type === 'in' ? 'bg-emerald-50 text-emerald-600' : 'bg-rose-50 text-rose-600'}`}>
                                                            {t.type === 'in' ? 'BARANG MASUK' : 'BARANG KELUAR'}
                                                        </span>
                                                    </td>
                                                    <td className={`px-8 py-6 text-right font-black italic text-2xl ${t.type === 'in' ? 'text-emerald-500' : 'text-rose-500'}`}>
                                                        {t.type === 'in' ? '+' : '-'}{t.amount}
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            )}
                        </main>
                    </div>

                    {/* Transaction Modal */}
                    {showModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[200] flex items-center justify-center p-6">
                            <div className="bg-white rounded-[3rem] w-full max-w-sm overflow-hidden shadow-2xl animate-in zoom-in duration-200">
                                <div className={`p-10 ${showModal === 'in' ? 'bg-indigo-600' : 'bg-slate-900'} text-white`}>
                                    <h2 className="text-2xl font-black italic uppercase tracking-tighter mb-1">
                                        {showModal === 'in' ? 'TAMBAH STOK' : 'KELUARKAN BARANG'}
                                    </h2>
                                    <p className="text-[10px] font-bold opacity-60 uppercase tracking-widest">{selectedItem?.name} (Size {selectedItem?.size})</p>
                                </div>
                                <form onSubmit={handleUpdateStock} className="p-10">
                                    <div className="mb-10 text-center">
                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4 italic">Masukkan Jumlah (PCS)</p>
                                        <input 
                                            name="amount" 
                                            type="number" 
                                            required 
                                            autoFocus
                                            className="w-full text-center text-7xl font-black italic text-slate-900 outline-none bg-transparent tracking-tighter" 
                                            placeholder="0"
                                        />
                                    </div>
                                    <div className="grid grid-cols-2 gap-3">
                                        <button 
                                            type="button" 
                                            onClick={() => setShowModal(null)}
                                            className="py-5 bg-slate-100 text-slate-400 rounded-3xl font-black text-[10px] uppercase tracking-widest hover:bg-slate-200 transition-colors"
                                        >
                                            BATAL
                                        </button>
                                        <button 
                                            type="submit" 
                                            className={`py-5 text-white rounded-3xl font-black text-[10px] uppercase tracking-widest shadow-xl transition-all ${showModal === 'in' ? 'bg-indigo-600 shadow-indigo-500/20 hover:bg-indigo-700' : 'bg-slate-900 shadow-slate-900/20 hover:bg-black'}`}
                                        >
                                            SIMPAN DATA
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
