<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ritus Street Inventory</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f172a] text-slate-400">

    <!-- Indikator Render -->
    <div id="root">
        <div class="min-h-screen flex items-center justify-center">
            <div class="text-center">
                <div class="w-10 h-10 border-4 border-blue-500/20 border-t-blue-500 rounded-full animate-spin mx-auto mb-4"></div>
                <p id="status-text" class="text-xs font-mono tracking-widest uppercase">System Initializing...</p>
            </div>
        </div>
    </div>

    <!-- Load Libraries secara sekuensial -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB2xfDX5PU_nP5TEPSYFL6xmBcS0wZrj_c",
            authDomain: "ritus-street-inventory.firebaseapp.com",
            projectId: "ritus-street-inventory",
            storageBucket: "ritus-street-inventory.firebasestorage.app",
            messagingSenderId: "249697895281",
            appId: "1:249697895281:web:c44bccdd16958c9d28ecd0"
        };

        try {
            const app = initializeApp(firebaseConfig);
            window.RitusAuth = getAuth(app);
            window.FirebaseReady = true;
            console.log("Firebase Connected");
        } catch (e) {
            console.error("Firebase Error:", e);
        }
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [isReady, setIsReady] = useState(false);
            const [user, setUser] = useState(null);
            const [email, setEmail] = useState("");
            const [password, setPassword] = useState("");
            const [error, setError] = useState("");

            useEffect(() => {
                const timer = setInterval(() => {
                    if (window.FirebaseReady && window.RitusAuth) {
                        setIsReady(true);
                        window.RitusAuth.onAuthStateChanged(u => setUser(u));
                        clearInterval(timer);
                    }
                }, 500);
                return () => clearInterval(timer);
            }, []);

            const login = async (e) => {
                e.preventDefault();
                setError("");
                try {
                    const { signInWithEmailAndPassword } = await import("https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js");
                    await signInWithEmailAndPassword(window.RitusAuth, email, password);
                } catch (err) {
                    setError("Invalid Credentials");
                }
            };

            if (!isReady) return null; // Biarkan loading HTML bawaan yang tampil

            return (
                <div className="min-h-screen flex items-center justify-center p-6 bg-slate-950">
                    <div className="w-full max-w-sm bg-slate-900 border border-white/5 p-8 rounded-3xl shadow-2xl">
                        <h1 className="text-2xl font-bold text-white text-center mb-1">RITUS STREET</h1>
                        <p className="text-[10px] text-blue-500 text-center tracking-[0.3em] mb-8 uppercase">Authorized Access</p>
                        
                        {error && <div className="mb-4 text-center text-red-500 text-xs bg-red-500/10 py-2 rounded-lg border border-red-500/20">{error}</div>}
                        
                        <form onSubmit={login} className="space-y-4">
                            <input type="email" placeholder="Email" onChange={e => setEmail(e.target.value)} className="w-full bg-slate-800 border border-slate-700 p-3 rounded-xl text-white outline-none focus:border-blue-500" required />
                            <input type="password" placeholder="Password" onChange={e => setPassword(e.target.value)} className="w-full bg-slate-800 border border-slate-700 p-3 rounded-xl text-white outline-none focus:border-blue-500" required />
                            <button className="w-full bg-blue-600 hover:bg-blue-500 text-white py-3 rounded-xl font-bold transition-all shadow-lg shadow-blue-600/20">LOGIN</button>
                        </form>
                    </div>
                </div>
            );
        }

        // Final Mounting
        const rootElement = document.getElementById('root');
        const root = ReactDOM.createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
