<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ritus Street Inventory</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #1e293b; }
        .sidebar-white { background: #ffffff; border-right: 1px solid #e2e8f0; }
        .btn-primary { background: #2563eb; color: white; transition: all 0.2s; }
        .btn-primary:hover { background: #1d4ed8; transform: translateY(-1px); }
        input::-webkit-inner-spin-button { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const Icon = ({ name, className }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        function App() {
            const [activeTab, setActiveTab] = useState('Daftar Stok');
            const [inventory, setInventory] = useState([]);
            const [transactions, setTransactions] = useState([]);
            const [historyFilter, setHistoryFilter] = useState('Semua');
            const [sortOrder, setSortOrder] = useState('Terbaru');
            const fileInputRef = useRef(null);

            // --- FUNGSI DASAR TRANSAKSI ---
            const addLog = (name, qty, type, category) => {
                setTransactions(prev => [{
                    id: Date.now() + Math.random(),
                    name, qty, type, category,
                    timestamp: new Date()
                }, ...prev]);
            };

            const processStockEntry = (name, qty, category) => {
                if (!name || isNaN(qty)) return;
                
                setInventory(prev => {
                    const exists = prev.find(i => 
                        i.name.toLowerCase() === name.toLowerCase() && 
                        i.category.toLowerCase() === category.toLowerCase()
                    );
                    if (exists) {
                        return prev.map(i => i === exists ? { ...i, qty: i.qty + qty } : i);
                    }
                    return [...prev, { id: Date.now() + Math.random(), name, qty, category }];
                });
                addLog(name, qty, 'IN', category);
            };

            // --- HANDLER INPUT ---
            const handleManualSubmit = (e) => {
                e.preventDefault();
                const data = new FormData(e.target);
                processStockEntry(data.get('name'), parseInt(data.get('qty')), data.get('category'));
                e.target.reset();
                alert("Data Berhasil Disimpan!");
            };

            const handleCSVUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    const lines = event.target.result.split('\n').filter(line => line.trim() !== "");
                    if (lines.length < 2) return;

                    // Deteksi Header untuk kecocokan kolom
                    const headers = lines[0].toLowerCase().split(',').map(h => h.trim());
                    const nameIdx = headers.findIndex(h => h.includes('nama') || h.includes('product') || h.includes('item'));
                    const qtyIdx = headers.findIndex(h => h.includes('qty') || h.includes('jumlah') || h.includes('stok'));
                    const catIdx = headers.findIndex(h => h.includes('kategori') || h.includes('cat'));

                    lines.slice(1).forEach(line => {
                        const cols = line.split(',').map(c => c.trim());
                        const name = cols[nameIdx !== -1 ? nameIdx : 0];
                        const qty = parseInt(cols[qtyIdx !== -1 ? qtyIdx : 1]);
                        const category = cols[catIdx !== -1 ? catIdx : 2] || 'Apparel';
                        
                        if (name && !isNaN(qty)) {
                            processStockEntry(name, qty, category);
                        }
                    });
                    alert("Import Selesai: Data otomatis digabung jika ada nama yang sama.");
                    fileInputRef.current.value = '';
                };
                reader.readAsText(file);
            };

            // --- STOK ADJUSTMENT (Daftar Stok) ---
            const adjustStock = (id, amount) => {
                const item = inventory.find(i => i.id === id);
                if (amount < 0 && item.qty + amount < 0) {
                    alert(`⚠️ GAGAL: Stok ${item.name} tidak mencukupi (Sisa: ${item.qty})`);
                    return;
                }
                setInventory(prev => prev.map(i => i.id === id ? { ...i, qty: i.qty + amount } : i));
                addLog(item.name, Math.abs(amount), amount > 0 ? 'IN' : 'OUT', item.category);
            };

            // --- LOGIKA REKAPAN (History) ---
            const filteredLogs = useMemo(() => {
                let res = [...transactions];
                if (historyFilter !== 'Semua') res = res.filter(l => l.type === historyFilter);
                return res.sort((a, b) => sortOrder === 'Terbaru' ? b.id - a.id : a.id - b.id);
            }, [transactions, historyFilter, sortOrder]);

            const downloadHistory = () => {
                const csvContent = "data:text/csv;charset=utf-8,Waktu,Barang,Kategori,Tipe,Jumlah\n" + 
                    filteredLogs.map(l => `${l.timestamp.toLocaleString()},${l.name},${l.category},${l.type},${l.qty}`).join("\n");
                const link = document.createElement("a");
                link.setAttribute("href", encodeURI(csvContent));
                link.setAttribute("download", `Rekap_Ritus_${new Date().toLocaleDateString()}.csv`);
                document.body.appendChild(link);
                link.click();
            };

            return (
                <div className="flex min-h-screen">
                    {/* SIDEBAR */}
                    <aside className="w-72 sidebar-white p-8 flex flex-col shadow-sm fixed h-full z-10">
                        <div className="mb-12">
                            <h2 className="text-2xl font-black italic tracking-tighter text-slate-900">RITUS<span className="text-blue-600">.</span></h2>
                        </div>
                        <nav className="space-y-2 flex-1">
                            {[
                                { id: 'Penambahan Stok', icon: 'plus-circle' },
                                { id: 'Daftar Stok', icon: 'package' },
                                { id: 'Riwayat Transaksi', icon: 'history' }
                            ].map(tab => (
                                <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`w-full flex items-center gap-4 px-5 py-4 rounded-2xl font-bold text-sm transition-all ${activeTab === tab.id ? 'bg-blue-600 text-white shadow-lg shadow-blue-200' : 'text-slate-400 hover:bg-slate-50'}`}>
                                    <Icon name={tab.icon} className="w-5 h-5" /> {tab.id}
                                </button>
                            ))}
                        </nav>
                        <div className="pt-6 border-t border-slate-100 text-[10px] font-bold text-slate-400 uppercase tracking-widest text-center">Version 5.0 Stable</div>
                    </aside>

                    {/* MAIN */}
                    <main className="flex-1 ml-72 p-12 bg-[#f8fafc]">
                        <header className="mb-10">
                            <h1 className="text-4xl font-black text-slate-900 uppercase tracking-tight">{activeTab}</h1>
                            <div className="h-1 w-20 bg-blue-600 mt-2 rounded-full"></div>
                        </header>

                        {/* VIEW: PENAMBAHAN */}
                        {activeTab === 'Penambahan Stok' && (
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 animate-in fade-in slide-in-from-bottom-4 duration-500">
                                <div className="bg-white p-10 rounded-[2.5rem] border border-slate-100 shadow-sm">
                                    <h3 className="font-black text-xs uppercase tracking-widest mb-8 text-blue-600 flex items-center gap-2"><Icon name="edit-3" className="w-4 h-4" /> Input Manual</h3>
                                    <form onSubmit={handleManualSubmit} className="space-y-6">
                                        <input name="name" required className="w-full bg-slate-50 p-4 rounded-2xl outline-none focus:ring-2 ring-blue-100 font-bold" placeholder="Nama Produk" />
                                        <div className="grid grid-cols-2 gap-4">
                                            <input name="qty" type="number" required className="w-full bg-slate-50 p-4 rounded-2xl outline-none font-bold" placeholder="Jumlah" />
                                            <select name="category" className="w-full bg-slate-50 p-4 rounded-2xl outline-none font-bold">
                                                <option>Apparel</option><option>Aksesoris</option><option>Cans</option>
                                            </select>
                                        </div>
                                        <button className="w-full py-5 btn-primary rounded-2xl font-black uppercase text-xs tracking-widest shadow-xl shadow-blue-100">Simpan Ke Gudang</button>
                                    </form>
                                </div>
                                <div className="bg-slate-900 p-10 rounded-[2.5rem] shadow-2xl flex flex-col justify-center text-center border border-white/5">
                                    <h3 className="font-black text-xs uppercase tracking-widest mb-2 text-white">Import File (Ritus_5.csv)</h3>
                                    <p className="text-slate-500 text-[10px] mb-8 font-medium">Sistem akan otomatis menggabung stok jika nama & kategori sama</p>
                                    <input type="file" accept=".csv" ref={fileInputRef} onChange={handleCSVUpload} className="hidden" id="csvFile" />
                                    <label htmlFor="csvFile" className="cursor-pointer bg-white/5 hover:bg-white/10 text-white py-10 border-2 border-dashed border-white/10 rounded-[2rem] flex flex-col items-center transition-all group">
                                        <Icon name="file-up" className="w-12 h-12 mb-4 text-blue-500 group-hover:scale-110 transition-transform" />
                                        <span className="font-black text-xs uppercase tracking-widest">Pilih File CSV</span>
                                    </label>
                                </div>
                            </div>
                        )}

                        {/* VIEW: DAFTAR */}
                        {activeTab === 'Daftar Stok' && (
                            <div className="bg-white rounded-[2.5rem] border border-slate-100 shadow-sm overflow-hidden">
                                <table className="w-full text-left">
                                    <thead className="bg-slate-50 text-[10px] font-black uppercase text-slate-400 tracking-widest">
                                        <tr><th className="p-6">Produk</th><th className="p-6">Kategori</th><th className="p-6">Stok</th><th className="p-6 text-center">Update Cepat</th></tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-50">
                                        {inventory.length === 0 ? (
                                            <tr><td colSpan="4" className="p-24 text-center text-slate-300 italic font-medium">Belum ada barang di rak gudang.</td></tr>
                                        ) : inventory.map(item => (
                                            <tr key={item.id} className="hover:bg-slate-50/50">
                                                <td className="p-6 font-bold text-slate-800">{item.name}</td>
                                                <td className="p-6"><span className="px-3 py-1 bg-slate-100 text-slate-500 rounded-full text-[9px] font-black uppercase">{item.category}</span></td>
                                                <td className="p-6 font-black text-3xl text-slate-900">{item.qty}</td>
                                                <td className="p-6 flex justify-center gap-3">
                                                    <button onClick={() => adjustStock(item.id, 1)} className="w-12 h-12 bg-emerald-50 text-emerald-600 rounded-2xl hover:bg-emerald-600 hover:text-white transition-all flex items-center justify-center shadow-sm"><Icon name="plus" className="w-5 h-5" /></button>
                                                    <button onClick={() => adjustStock(item.id, -1)} className="w-12 h-12 bg-rose-50 text-rose-600 rounded-2xl hover:bg-rose-600 hover:text-white transition-all flex items-center justify-center shadow-sm"><Icon name="minus" className="w-5 h-5" /></button>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}

                        {/* VIEW: RIWAYAT */}
                        {activeTab === 'Riwayat Transaksi' && (
                            <div className="space-y-6">
                                <div className="flex flex-wrap gap-4 justify-between items-center bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm">
                                    <div className="flex gap-3">
                                        <select onChange={(e) => setHistoryFilter(e.target.value)} className="bg-slate-50 px-5 py-3 rounded-xl text-[10px] font-black outline-none border border-slate-100 uppercase tracking-widest">
                                            <option value="Semua">Semua Tipe</option><option value="IN">Masuk (IN)</option><option value="OUT">Keluar (OUT)</option>
                                        </select>
                                        <select onChange={(e) => setSortOrder(e.target.value)} className="bg-slate-50 px-5 py-3 rounded-xl text-[10px] font-black outline-none border border-slate-100 uppercase tracking-widest">
                                            <option value="Terbaru">Terbaru</option><option value="Terlama">Terlama</option>
                                        </select>
                                    </div>
                                    <button onClick={downloadHistory} className="bg-slate-900 text-white px-8 py-3 rounded-xl font-black text-[10px] uppercase tracking-[0.2em] flex items-center gap-2 hover:bg-blue-600 transition-all shadow-lg">
                                        <Icon name="download" className="w-4 h-4" /> Download Rekapan
                                    </button>
                                </div>
                                <div className="bg-white rounded-[2.5rem] border border-slate-100 shadow-sm overflow-hidden text-sm font-semibold">
                                    <table className="w-full text-left">
                                        <thead className="bg-slate-50 text-[10px] font-black uppercase text-slate-400 tracking-widest">
                                            <tr><th className="p-6">Waktu</th><th className="p-6">Barang</th><th className="p-6">Kategori</th><th className="p-6">Tipe</th><th className="p-6">Jumlah</th></tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-50">
                                            {filteredLogs.map(log => (
                                                <tr key={log.id}>
                                                    <td className="p-6 text-[10px] text-slate-400 font-medium">{log.timestamp.toLocaleString()}</td>
                                                    <td className="p-6 text-slate-800 font-bold">{log.name}</td>
                                                    <td className="p-6 text-slate-500 text-[10px] uppercase">{log.category}</td>
                                                    <td className="p-6"><span className={`px-4 py-1 rounded-full text-[9px] font-black ${log.type === 'IN' ? 'bg-emerald-50 text-emerald-600' : 'bg-rose-50 text-rose-600'}`}>{log.type}</span></td>
                                                    <td className="p-6 font-black text-lg">{log.qty}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
