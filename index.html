<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ritus Street Inventory</title>
    
    <!-- Library Utama -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <!-- Firebase SDK Setup -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB2xfDX5PU_nP5TEPSYFL6xmBcS0wZrj_c",
            authDomain: "ritus-street-inventory.firebaseapp.com",
            projectId: "ritus-street-inventory",
            storageBucket: "ritus-street-inventory.firebasestorage.app",
            messagingSenderId: "249697895281",
            appId: "1:249697895281:web:c44bccdd16958c9d28ecd0"
        };

        try {
            const app = initializeApp(firebaseConfig);
            window.RitusAuth = getAuth(app);
            window.RitusLogin = signInWithEmailAndPassword;
            window.RitusLogout = signOut;
            window.FirebaseReady = true;
        } catch (e) {
            console.error("Firebase Error:", e);
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; }
        .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <div id="root">
        <!-- Loading Screen Awal -->
        <div class="min-h-screen flex items-center justify-center">
            <div class="text-center">
                <div class="w-10 h-10 border-2 border-blue-500/20 border-t-blue-500 rounded-full animate-spin mx-auto mb-4"></div>
                <p class="text-[10px] tracking-[0.3em] text-slate-500 uppercase">Waking Up Ritus System...</p>
            </div>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [isReady, setIsReady] = useState(false);
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('Dashboard');
            const [email, setEmail] = useState('');
            const [pass, setPass] = useState('');
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');

            useEffect(() => {
                const check = setInterval(() => {
                    if (window.FirebaseReady && window.RitusAuth) {
                        window.RitusAuth.onAuthStateChanged(u => setUser(u));
                        setIsReady(true);
                        clearInterval(check);
                    }
                }, 500);
                return () => clearInterval(check);
            }, []);

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError('');
                try {
                    await window.RitusLogin(window.RitusAuth, email.trim(), pass);
                } catch (err) {
                    setError("AKSES DITOLAK: EMAIL ATAU PASSWORD SALAH");
                } finally {
                    setLoading(false);
                }
            };

            if (!isReady) return null;

            // --- TAMPILAN DASHBOARD (JIKA SUDAH LOGIN) ---
            if (user) {
                return (
                    <div className="flex min-h-screen bg-[#020617] text-slate-300 animate-in fade-in duration-500">
                        {/* Sidebar */}
                        <aside className="w-64 bg-slate-900/40 border-r border-white/5 p-6 hidden md:flex flex-col">
                            <div className="mb-10 px-2">
                                <h2 className="text-2xl font-black italic text-white tracking-tighter">RITUS STREET</h2>
                                <div className="h-1 w-8 bg-blue-600 mt-1 rounded-full"></div>
                            </div>
                            
                            <nav className="flex-1 space-y-1">
                                {['Dashboard', 'Apparel', 'Accessories', 'Cans'].map((item) => (
                                    <button 
                                        key={item} 
                                        onClick={() => setActiveTab(item)}
                                        className={`w-full text-left px-4 py-3 rounded-xl transition-all font-bold text-sm ${activeTab === item ? 'bg-blue-600 text-white shadow-lg shadow-blue-600/20' : 'text-slate-500 hover:bg-white/5 hover:text-slate-300'}`}
                                    >
                                        {item}
                                    </button>
                                ))}
                            </nav>

                            <div className="pt-6 border-t border-white/5">
                                <button onClick={() => window.RitusLogout(window.RitusAuth)} className="w-full py-3 rounded-xl bg-red-500/10 text-red-500 border border-red-500/20 text-xs font-black hover:bg-red-500 hover:text-white transition-all uppercase tracking-widest">
                                    Logout
                                </button>
                            </div>
                        </aside>

                        {/* Area Utama */}
                        <main className="flex-1 p-8 overflow-y-auto">
                            <header className="flex justify-between items-start mb-10">
                                <div>
                                    <h1 className="text-3xl font-black text-white tracking-tight">{activeTab}</h1>
                                    <p className="text-slate-500 text-sm mt-1">Sistem aktif untuk {user.email}</p>
                                </div>
                                <button className="bg-blue-600 hover:bg-blue-500 text-white px-6 py-3 rounded-2xl font-bold text-xs tracking-widest transition-all shadow-xl shadow-blue-600/20 uppercase">
                                    + Entry Baru
                                </button>
                            </header>

                            {/* Ringkasan Data */}
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                                <div className="glass-card p-8 rounded-[2rem]">
                                    <p className="text-slate-500 text-[10px] uppercase font-black tracking-[0.2em] mb-2">Total Stok</p>
                                    <h3 className="text-4xl font-black text-white">0</h3>
                                </div>
                                <div className="glass-card p-8 rounded-[2rem]">
                                    <p className="text-slate-500 text-[10px] uppercase font-black tracking-[0.2em] mb-2">Proses</p>
                                    <h3 className="text-4xl font-black text-blue-500">0</h3>
                                </div>
                                <div className="glass-card p-8 rounded-[2rem]">
                                    <p className="text-slate-500 text-[10px] uppercase font-black tracking-[0.2em] mb-2">Keluar</p>
                                    <h3 className="text-4xl font-black text-slate-700">0</h3>
                                </div>
                            </div>

                            {/* Area Tabel/List */}
                            <div className="glass-card rounded-[2.5rem] p-12 text-center border-dashed border-white/10 min-h-[300px] flex items-center justify-center">
                                <div>
                                    <div className="w-16 h-16 bg-slate-800/50 rounded-full flex items-center justify-center mx-auto mb-4 border border-white/5">
                                        <svg className="w-6 h-6 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"></path></svg>
                                    </div>
                                    <p className="text-slate-600 font-bold italic text-sm">Belum ada data di kategori {activeTab}.</p>
                                </div>
                            </div>
                        </main>
                    </div>
                );
            }

            // --- TAMPILAN LOGIN (JIKA BELUM LOGIN) ---
            return (
                <div className="min-h-screen flex items-center justify-center p-6 bg-[radial-gradient(circle_at_top,_var(--tw-gradient-stops))] from-slate-900 via-slate-950 to-black">
                    <div className="w-full max-w-sm animate-in fade-in slide-in-from-bottom-4 duration-700">
                        <div className="text-center mb-10">
                            <h2 className="text-5xl font-black italic text-white tracking-tighter uppercase">RITUS</h2>
                            <p className="text-blue-500 text-[10px] tracking-[0.5em] font-bold uppercase mt-2">Inventory System</p>
                        </div>
                        <div className="glass-card p-8 rounded-[2.5rem] shadow-2xl border-white/10">
                            {error && <div className="mb-6 p-4 bg-red-500/10 border border-red-500/20 rounded-2xl text-red-400 text-[10px] font-bold text-center uppercase tracking-widest">{error}</div>}
                            <form onSubmit={handleLogin} className="space-y-4">
                                <input 
                                    type="email" 
                                    placeholder="ADMIN EMAIL" 
                                    onChange={e => setEmail(e.target.value)} 
                                    className="w-full bg-slate-800/40 border border-white/5 p-4 rounded-2xl text-white outline-none focus:border-blue-500 transition-all font-bold text-sm" 
                                    required 
                                />
                                <input 
                                    type="password" 
                                    placeholder="SECURITY CODE" 
                                    onChange={e => setPass(e.target.value)} 
                                    className="w-full bg-slate-800/40 border border-white/5 p-4 rounded-2xl text-white outline-none focus:border-blue-500 transition-all font-bold text-sm" 
                                    required 
                                />
                                <button disabled={loading} className="w-full bg-blue-600 hover:bg-blue-500 py-5 rounded-2xl font-black text-xs tracking-[0.2em] text-white transition-all shadow-lg shadow-blue-600/20 active:scale-95 uppercase">
                                    {loading ? 'Verifying...' : 'Access System'}
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
