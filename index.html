<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ritus Street Inventory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .modal-animate { animation: zoomIn 0.2s ease-out; }
        @keyframes zoomIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .tab-content { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .sidebar-transition { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        /* Logo Styles */
        .app-logo {
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
            transition: transform 0.3s ease;
        }
        .app-logo:hover {
            transform: scale(1.05) rotate(-2deg);
        }
    </style>
</head>
<body class="bg-[#F8FAFC] text-slate-900">
    <div id="root"></div>

    <!-- React Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, addDoc, deleteDoc, query } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        window.FB = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore, collection, doc, setDoc, onSnapshot, addDoc, deleteDoc, query };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Assets
        const APP_LOGO_URL = "https://files.oaiusercontent.com/file-K1S77fR0PZ3n32o2M2p2M2p2?se=2024-05-02T08%3A17%3A44Z&sp=r&sv=2021-08-06&sr=b&rscc=max-age%3D31536000%2C%20immutable&rscd=attachment%3B%20filename%3Dimage_2e1d19.png&sig=O25p5TEPSYFL6xmBcS0wZrj_c%3D";

        const firebaseConfig = { 
            apiKey: "AIzaSyB2xfDX5PU_nP5TEPSYFL6xmBcS0wZrj_c", 
            authDomain: "ritus-street-inventory.firebaseapp.com", 
            projectId: "ritus-street-inventory", 
            storageBucket: "ritus-street-inventory.firebasestorage.app", 
            messagingSenderId: "249697895281", 
            appId: "1:1032338604753:web:96e87f17b660c6d649887f" 
        };
        const appId = 'ritus-street-v2';

        const InventoryPieChart = ({ apparelCount, aksesorisCount }) => {
            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            useEffect(() => {
                if (chartInstance.current) chartInstance.current.destroy();
                const ctx = chartRef.current.getContext('2d');
                chartInstance.current = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: ['Apparel', 'Aksesoris'],
                        datasets: [{
                            data: [apparelCount, aksesorisCount],
                            backgroundColor: ['#6366f1', '#10b981'],
                            borderColor: ['#ffffff', '#ffffff'],
                            borderWidth: 4,
                            hoverOffset: 10
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: 'bottom',
                                labels: { color: '#94a3b8', font: { family: 'Inter', weight: 'bold', size: 10 }, padding: 20, usePointStyle: true }
                            }
                        },
                        cutout: '70%'
                    }
                });
                return () => { if (chartInstance.current) chartInstance.current.destroy(); };
            }, [apparelCount, aksesorisCount]);

            return (
                <div className="relative h-64 w-full">
                    <canvas ref={chartRef}></canvas>
                    <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                        <span className="text-[10px] font-black uppercase text-slate-500 italic tracking-widest">Total</span>
                        <span className="text-3xl font-black italic tracking-tighter text-white">{apparelCount + aksesorisCount}</span>
                    </div>
                </div>
            );
        };

        function App() {
            const [user, setUser] = useState(null);
            const [inventory, setInventory] = useState([]);
            const [transactions, setTransactions] = useState([]);
            const [loading, setLoading] = useState(true);
            const [tab, setTab] = useState('dashboard');
            const [categoryFilter, setCategoryFilter] = useState('apparel');
            const [historyFilter, setHistoryFilter] = useState('all');
            const [searchQuery, setSearchQuery] = useState('');
            const [showModal, setShowModal] = useState(null);
            const [selectedItem, setSelectedItem] = useState(null);
            const [selectedSize, setSelectedSize] = useState(null);
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);
            const [db, setDb] = useState(null);
            const fileInputRef = useRef(null);

            useEffect(() => {
                const checkFB = setInterval(() => {
                    if (window.FB) {
                        clearInterval(checkFB);
                        const app = window.FB.initializeApp(firebaseConfig);
                        const fbAuth = window.FB.getAuth(app);
                        const fbDb = window.FB.getFirestore(app);
                        setDb(fbDb);
                        window.FB.signInAnonymously(fbAuth).catch(console.error);
                        window.FB.onAuthStateChanged(fbAuth, (u) => { if (u) { setUser(u); setLoading(false); } });
                    }
                }, 100);
            }, []);

            useEffect(() => {
                if (!user || !db) return;
                const unsubInv = window.FB.onSnapshot(window.FB.collection(db, 'artifacts', appId, 'public', 'data', 'inventory'), (snap) => {
                    setInventory(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });
                const unsubTrans = window.FB.onSnapshot(window.FB.collection(db, 'artifacts', appId, 'public', 'data', 'transactions'), (snap) => {
                    const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setTransactions(data.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp)));
                });
                return () => { unsubInv(); unsubTrans(); };
            }, [user, db]);

            useEffect(() => { if(window.lucide) window.lucide.createIcons(); }, [tab, inventory, isSidebarOpen, categoryFilter, searchQuery, historyFilter]);

            const stats = {
                totalItems: inventory.length,
                totalStock: inventory.reduce((acc, item) => {
                    if(item.category === 'apparel') return acc + Object.values(item.sizes || {}).reduce((a, b) => a + b, 0);
                    return acc + (item.stock || 0);
                }, 0),
                lowStockItems: inventory.filter(item => {
                    if(item.category === 'aksesoris') return (item.stock || 0) <= (item.minStock || 5);
                    return Object.values(item.sizes || {}).some(s => s <= 2);
                }),
                apparelCount: inventory.filter(i => i.category === 'apparel').length,
                aksesorisCount: inventory.filter(i => i.category === 'aksesoris').length
            };

            const processTransaction = async (item, size, amount, type, customTime = null) => {
                let updatedData = { ...item };
                const timestamp = customTime || new Date().toISOString();
                if (item.category === 'apparel') {
                    const currentStock = item.sizes[size] || 0;
                    const newStock = type === 'in' ? currentStock + amount : currentStock - amount;
                    if (newStock < 0) return false;
                    updatedData.sizes[size] = newStock;
                } else {
                    const newStock = type === 'in' ? item.stock + amount : item.stock - amount;
                    if (newStock < 0) return false;
                    updatedData.stock = newStock;
                }
                await window.FB.setDoc(window.FB.doc(db, 'artifacts', appId, 'public', 'data', 'inventory', item.id), updatedData, { merge: true });
                await window.FB.addDoc(window.FB.collection(db, 'artifacts', appId, 'public', 'data', 'transactions'), {
                    itemName: item.name, 
                    info: item.category === 'apparel' ? size : (item.location || '-'),
                    type, amount, timestamp
                });
                return true;
            };

            const handleCSVUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = async (event) => {
                    const text = event.target.result;
                    const rows = text.split('\n').filter(row => row.trim() !== '');
                    const dataRows = rows.slice(1);
                    for (let row of dataRows) {
                        const [name, info, type, amountStr, timeStr] = row.split(',').map(s => s?.trim());
                        const amount = parseInt(amountStr);
                        if (!name || !type || isNaN(amount)) continue;
                        const item = inventory.find(i => i.name.toLowerCase() === name.toLowerCase());
                        if (item) {
                            const sizeVal = (item.category === 'apparel') ? info.toUpperCase() : null;
                            const customTime = timeStr ? new Date(timeStr).toISOString() : null;
                            const finalTime = (customTime && customTime !== 'Invalid Date') ? customTime : new Date().toISOString();
                            await processTransaction(item, sizeVal, amount, type.toLowerCase(), finalTime);
                        }
                    }
                    e.target.value = null;
                };
                reader.readAsText(file);
            };

            const filteredHistory = transactions.filter(t => {
                const matchesSearch = t.itemName.toLowerCase().includes(searchQuery.toLowerCase());
                const matchesFilter = historyFilter === 'all' || t.type === historyFilter;
                return matchesSearch && matchesFilter;
            });

            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center bg-slate-900 text-white">
                    <img src={APP_LOGO_URL} className="w-20 h-20 mb-6 animate-pulse" alt="Ritus Logo" />
                    <p className="font-black uppercase tracking-[0.3em] text-[10px]">Memuat Data Ritus...</p>
                </div>
            );

            return (
                <div className="min-h-screen">
                    {/* SIDEBAR */}
                    <div className={`fixed inset-y-0 left-0 w-72 bg-[#0F172A] text-white z-[150] sidebar-transition transform ${isSidebarOpen ? 'translate-x-0 shadow-2xl' : '-translate-x-full'} flex flex-col`}>
                        <div className="p-8 border-b border-slate-800/50 flex flex-col items-center">
                            <div className="flex items-center gap-4 mb-2">
                                <img src={APP_LOGO_URL} className="w-14 h-14 app-logo" alt="Ritus Street Logo" />
                                <div>
                                    <h1 className="font-black italic uppercase tracking-tighter text-2xl leading-none">RITUS</h1>
                                    <span className="text-[9px] font-bold text-slate-500 tracking-[0.2em] uppercase">Inventory V2</span>
                                </div>
                            </div>
                        </div>
                        
                        <nav className="p-6 space-y-2 flex-1">
                            <button onClick={() => {setTab('dashboard'); setIsSidebarOpen(false)}} className={`w-full flex items-center gap-4 p-4 rounded-2xl font-bold text-xs uppercase tracking-widest transition-all ${tab === 'dashboard' ? 'bg-indigo-600 text-white shadow-xl shadow-indigo-600/20' : 'text-slate-400 hover:bg-slate-800/50'}`}>
                                <i data-lucide="layout-grid" size="18"></i> Dashboard
                            </button>
                            <button onClick={() => {setTab('inventory'); setIsSidebarOpen(false)}} className={`w-full flex items-center gap-4 p-4 rounded-2xl font-bold text-xs uppercase tracking-widest transition-all ${tab === 'inventory' ? 'bg-indigo-600 text-white shadow-xl shadow-indigo-600/20' : 'text-slate-400 hover:bg-slate-800/50'}`}>
                                <i data-lucide="package" size="18"></i> Manajemen Stok
                            </button>
                            <button onClick={() => {setTab('history'); setIsSidebarOpen(false)}} className={`w-full flex items-center gap-4 p-4 rounded-2xl font-bold text-xs uppercase tracking-widest transition-all ${tab === 'history' ? 'bg-indigo-600 text-white shadow-xl shadow-indigo-600/20' : 'text-slate-400 hover:bg-slate-800/50'}`}>
                                <i data-lucide="scroll-text" size="18"></i> Riwayat Transaksi
                            </button>
                        </nav>

                        <div className="p-6 border-t border-slate-800/50">
                            <button onClick={() => fileInputRef.current.click()} className="w-full flex items-center justify-center gap-3 p-4 bg-slate-800/50 border border-slate-700 rounded-2xl text-slate-400 hover:text-white hover:border-indigo-500 transition-all font-black text-[9px] uppercase tracking-widest">
                                <i data-lucide="file-up" size="16"></i> Impor CSV
                            </button>
                            <input type="file" ref={fileInputRef} onChange={handleCSVUpload} accept=".csv" className="hidden" />
                        </div>
                    </div>

                    {isSidebarOpen && <div onClick={() => setIsSidebarOpen(false)} className="fixed inset-0 bg-slate-950/40 backdrop-blur-sm z-[140]"></div>}

                    {/* TOP NAVBAR */}
                    <nav className="glass-card h-20 px-6 flex items-center justify-between sticky top-0 z-50">
                        <div className="flex items-center gap-4">
                            <button onClick={() => setIsSidebarOpen(true)} className="w-12 h-12 flex items-center justify-center bg-white border border-slate-200 rounded-2xl hover:bg-slate-50 transition-all shadow-sm"><i data-lucide="menu" size="20"></i></button>
                            <div className="flex items-center gap-3">
                                <img src={APP_LOGO_URL} className="w-8 h-8 md:hidden" alt="Logo" />
                                <h2 className="font-black italic uppercase tracking-tighter text-xl text-slate-800">{tab === 'dashboard' ? 'Overview' : tab === 'inventory' ? 'Inventory' : 'Riwayat'}</h2>
                            </div>
                        </div>
                        <div className="flex items-center gap-4">
                            <div className="relative hidden md:block w-64">
                                <i data-lucide="search" className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" size="14"></i>
                                <input 
                                    type="text" 
                                    placeholder="CARI DATA..." 
                                    className="w-full pl-10 pr-4 py-2.5 bg-slate-100 border-none rounded-xl font-bold uppercase text-[10px] tracking-widest outline-none focus:ring-2 ring-indigo-500/10"
                                    value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                />
                            </div>
                        </div>
                    </nav>

                    <main className="max-w-6xl mx-auto p-6 tab-content">
                        {tab === 'dashboard' && (
                            <div className="space-y-8">
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    <div className="bg-white p-8 rounded-[2.5rem] border border-slate-200 shadow-sm hover:shadow-md transition-shadow">
                                        <div className="w-12 h-12 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center mb-6"><i data-lucide="package-search" size="24"></i></div>
                                        <p className="text-[10px] font-black text-slate-400 uppercase italic">Varian Produk</p>
                                        <h3 className="text-5xl font-black italic tracking-tighter">{stats.totalItems}</h3>
                                    </div>
                                    <div className="bg-white p-8 rounded-[2.5rem] border border-slate-200 shadow-sm hover:shadow-md transition-shadow">
                                        <div className="w-12 h-12 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center mb-6"><i data-lucide="boxes" size="24"></i></div>
                                        <p className="text-[10px] font-black text-slate-400 uppercase italic">Stok Fisik</p>
                                        <h3 className="text-5xl font-black italic tracking-tighter">{stats.totalStock}</h3>
                                    </div>
                                    <div className={`p-8 rounded-[2.5rem] border shadow-sm transition-all ${stats.lowStockItems.length > 0 ? 'bg-rose-50 border-rose-200' : 'bg-white border-slate-200'}`}>
                                        <div className={`w-12 h-12 rounded-2xl flex items-center justify-center mb-6 ${stats.lowStockItems.length > 0 ? 'bg-rose-500 text-white shadow-lg shadow-rose-200' : 'bg-slate-100 text-slate-400'}`}><i data-lucide="alert-circle" size="24"></i></div>
                                        <p className={`text-[10px] font-black uppercase italic ${stats.lowStockItems.length > 0 ? 'text-rose-600' : 'text-slate-400'}`}>Stok Menipis</p>
                                        <h3 className={`text-5xl font-black italic tracking-tighter ${stats.lowStockItems.length > 0 ? 'text-rose-700' : 'text-slate-800'}`}>{stats.lowStockItems.length}</h3>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                    <div className="bg-[#0F172A] text-white p-8 rounded-[3rem] shadow-2xl flex flex-col items-center">
                                        <h4 className="w-full font-black italic uppercase text-lg mb-8 tracking-tighter flex items-center gap-3">
                                            <i data-lucide="pie-chart" size="20" className="text-indigo-400"></i> Distribusi Kategori
                                        </h4>
                                        <div className="w-full max-w-[300px]">
                                            <InventoryPieChart apparelCount={stats.apparelCount} aksesorisCount={stats.aksesorisCount} />
                                        </div>
                                        <div className="mt-8 grid grid-cols-2 gap-6 w-full">
                                            <div className="flex items-center gap-3 p-4 bg-white/5 rounded-2xl border border-white/10">
                                                <div className="w-3 h-3 rounded-full bg-indigo-500"></div>
                                                <div>
                                                    <p className="text-[9px] font-black text-slate-500 uppercase italic">Apparel</p>
                                                    <p className="text-sm font-black uppercase italic">{stats.apparelCount} Artikel</p>
                                                </div>
                                            </div>
                                            <div className="flex items-center gap-3 p-4 bg-white/5 rounded-2xl border border-white/10">
                                                <div className="w-3 h-3 rounded-full bg-emerald-500"></div>
                                                <div>
                                                    <p className="text-[9px] font-black text-slate-500 uppercase italic">Aksesoris</p>
                                                    <p className="text-sm font-black uppercase italic">{stats.aksesorisCount} Artikel</p>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="bg-white p-8 rounded-[3rem] border border-slate-200 shadow-sm">
                                        <div className="flex justify-between items-center mb-8">
                                            <h4 className="font-black italic uppercase text-lg tracking-tighter">Aktivitas Terakhir</h4>
                                            <button onClick={() => setTab('history')} className="text-[10px] font-black uppercase italic text-indigo-600 hover:underline">Semua</button>
                                        </div>
                                        <div className="space-y-4 max-h-[350px] overflow-y-auto pr-2 custom-scrollbar">
                                            {transactions.slice(0, 5).map(t => (
                                                <div key={t.id} className="flex items-center justify-between p-4 bg-slate-50 rounded-2xl border border-slate-100">
                                                    <div className="flex items-center gap-4">
                                                        <div className={`w-10 h-10 rounded-xl flex items-center justify-center ${t.type === 'in' ? 'bg-emerald-100 text-emerald-600' : 'bg-rose-100 text-rose-600'}`}>
                                                            <i data-lucide={t.type === 'in' ? 'arrow-down-left' : 'arrow-up-right'} size="16"></i>
                                                        </div>
                                                        <div>
                                                            <p className="font-black text-[11px] uppercase italic leading-tight">{t.itemName}</p>
                                                            <p className="text-[8px] font-bold text-slate-400 uppercase italic">{t.info}</p>
                                                        </div>
                                                    </div>
                                                    <p className={`font-black italic text-lg tracking-tighter ${t.type === 'in' ? 'text-emerald-500' : 'text-rose-500'}`}>
                                                        {t.type === 'in' ? '+' : '-'}{t.amount}
                                                    </p>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {tab === 'inventory' && (
                            <>
                                <div className="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
                                    <div className="flex bg-white p-1.5 rounded-3xl border border-slate-200 shadow-sm w-full md:w-auto">
                                        <button onClick={() => setCategoryFilter('apparel')} className={`flex-1 md:flex-none px-8 py-3 rounded-2xl font-black text-[10px] uppercase tracking-widest transition-all ${categoryFilter === 'apparel' ? 'bg-slate-900 text-white shadow-lg' : 'text-slate-400'}`}>Apparel</button>
                                        <button onClick={() => setCategoryFilter('aksesoris')} className={`flex-1 md:flex-none px-8 py-3 rounded-2xl font-black text-[10px] uppercase tracking-widest transition-all ${categoryFilter === 'aksesoris' ? 'bg-slate-900 text-white shadow-lg' : 'text-slate-400'}`}>Aksesoris</button>
                                    </div>
                                    <button onClick={() => setShowModal('add')} className="w-full md:w-auto bg-indigo-600 text-white px-8 py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest flex items-center justify-center gap-2 hover:bg-indigo-700 transition-all shadow-xl shadow-indigo-500/20">
                                        <i data-lucide="plus" size="16"></i> Tambah {categoryFilter}
                                    </button>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                    {inventory.filter(i => i.category === categoryFilter && i.name.toLowerCase().includes(searchQuery.toLowerCase())).map(item => (
                                        <div key={item.id} className="bg-white p-8 rounded-[2.5rem] border border-slate-200 shadow-sm relative group transition-all hover:border-indigo-400">
                                            <div className="flex justify-between items-start mb-6">
                                                <div>
                                                    <h3 className="font-black italic uppercase text-xl leading-tight tracking-tighter text-slate-800">{item.name}</h3>
                                                    <span className="text-[8px] font-black uppercase text-indigo-500 bg-indigo-50 px-2 py-0.5 rounded-full mt-1 inline-block">{item.location || 'Rak Umum'}</span>
                                                </div>
                                                <button onClick={async () => {if(confirm("Hapus artikel ini?")) await window.FB.deleteDoc(window.FB.doc(db, 'artifacts', appId, 'public', 'data', 'inventory', item.id))}} className="p-2 text-slate-200 hover:text-rose-500 transition-colors">
                                                    <i data-lucide="trash-2" size="16"></i>
                                                </button>
                                            </div>

                                            {item.category === 'apparel' ? (
                                                <div className="grid grid-cols-2 gap-4">
                                                    {Object.entries(item.sizes || {}).map(([size, stock]) => (
                                                        <div key={size} className="bg-slate-50 p-4 rounded-2xl border border-slate-100 flex justify-between items-center group/size hover:bg-white hover:shadow-md transition-all">
                                                            <div>
                                                                <p className="text-[9px] font-black text-slate-400 uppercase italic mb-1">{size}</p>
                                                                <p className={`text-2xl font-black italic ${stock <= 2 ? 'text-rose-500' : 'text-slate-800'}`}>{stock}</p>
                                                            </div>
                                                            <div className="flex flex-col gap-1 opacity-0 group-hover/size:opacity-100 transition-opacity">
                                                                <button onClick={() => {setSelectedItem(item); setSelectedSize(size); setShowModal('in');}} className="p-1.5 bg-emerald-500 text-white rounded-lg"><i data-lucide="plus" size="12"></i></button>
                                                                <button onClick={() => {setSelectedItem(item); setSelectedSize(size); setShowModal('out');}} className="p-1.5 bg-rose-500 text-white rounded-lg"><i data-lucide="minus" size="12"></i></button>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            ) : (
                                                <div className="flex justify-between items-end">
                                                    <div>
                                                        <p className="text-[10px] font-black text-slate-400 uppercase italic mb-1">Stok Unit</p>
                                                        <p className="text-6xl font-black italic tracking-tighter leading-none">{item.stock}</p>
                                                    </div>
                                                    <div className="flex gap-2">
                                                        <button onClick={() => {setSelectedItem(item); setShowModal('in');}} className="w-12 h-12 bg-emerald-500 text-white rounded-2xl flex items-center justify-center shadow-lg shadow-emerald-500/20"><i data-lucide="plus" size="20"></i></button>
                                                        <button onClick={() => {setSelectedItem(item); setShowModal('out');}} className="w-12 h-12 bg-rose-500 text-white rounded-2xl flex items-center justify-center shadow-lg shadow-rose-500/20"><i data-lucide="minus" size="20"></i></button>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            </>
                        )}
                        
                        {tab === 'history' && (
                            <div className="space-y-6">
                                <div className="flex flex-col md:flex-row justify-between items-center gap-4">
                                    <div className="flex bg-white p-1.5 rounded-3xl border border-slate-200 shadow-sm w-full md:w-auto">
                                        <button onClick={() => setHistoryFilter('all')} className={`flex-1 px-6 py-2.5 rounded-2xl font-black text-[9px] uppercase tracking-widest ${historyFilter === 'all' ? 'bg-slate-900 text-white' : 'text-slate-400'}`}>Semua</button>
                                        <button onClick={() => setHistoryFilter('in')} className={`flex-1 px-6 py-2.5 rounded-2xl font-black text-[9px] uppercase tracking-widest ${historyFilter === 'in' ? 'bg-emerald-500 text-white' : 'text-slate-400'}`}>Masuk</button>
                                        <button onClick={() => setHistoryFilter('out')} className={`flex-1 px-6 py-2.5 rounded-2xl font-black text-[9px] uppercase tracking-widest ${historyFilter === 'out' ? 'bg-rose-500 text-white' : 'text-slate-400'}`}>Keluar</button>
                                    </div>
                                    <p className="text-[10px] font-black uppercase text-slate-400 italic">Menampilkan {filteredHistory.length} Transaksi</p>
                                </div>

                                <div className="bg-white rounded-[2.5rem] border border-slate-200 shadow-sm overflow-hidden">
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left border-collapse">
                                            <thead>
                                                <tr className="bg-slate-50/50 border-b border-slate-100">
                                                    <th className="p-6 text-[10px] font-black uppercase italic text-slate-400 tracking-widest">Waktu & Tanggal</th>
                                                    <th className="p-6 text-[10px] font-black uppercase italic text-slate-400 tracking-widest">Artikel</th>
                                                    <th className="p-6 text-[10px] font-black uppercase italic text-slate-400 tracking-widest">Detail</th>
                                                    <th className="p-6 text-[10px] font-black uppercase italic text-slate-400 tracking-widest text-center">Tipe</th>
                                                    <th className="p-6 text-[10px] font-black uppercase italic text-slate-400 tracking-widest text-right">Jumlah</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-50">
                                                {filteredHistory.map(t => (
                                                    <tr key={t.id} className="hover:bg-slate-50/30 transition-colors">
                                                        <td className="p-6">
                                                            <div className="flex items-center gap-3 text-slate-400">
                                                                <i data-lucide="clock" size="14"></i>
                                                                <span className="text-[11px] font-bold">{new Date(t.timestamp).toLocaleString('id-ID', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' })}</span>
                                                            </div>
                                                        </td>
                                                        <td className="p-6">
                                                            <p className="font-black text-xs uppercase italic tracking-tight">{t.itemName}</p>
                                                        </td>
                                                        <td className="p-6">
                                                            <span className="text-[10px] font-bold text-slate-400 uppercase italic bg-slate-100 px-2 py-1 rounded-lg">{t.info}</span>
                                                        </td>
                                                        <td className="p-6 text-center">
                                                            <span className={`px-4 py-1.5 rounded-full text-[9px] font-black italic tracking-widest ${t.type === 'in' ? 'bg-emerald-100 text-emerald-600' : 'bg-rose-100 text-rose-600'}`}>
                                                                {t.type === 'in' ? 'MASUK' : 'KELUAR'}
                                                            </span>
                                                        </td>
                                                        <td className={`p-6 text-right font-black italic text-xl tracking-tighter ${t.type === 'in' ? 'text-emerald-500' : 'text-rose-500'}`}>
                                                            {t.type === 'in' ? '+' : '-'}{t.amount}
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* MODAL SYSTEM */}
                    {showModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[200] flex items-center justify-center p-4">
                            <div className="bg-white rounded-[3rem] w-full max-w-sm p-10 modal-animate shadow-2xl relative">
                                <button onClick={() => setShowModal(null)} className="absolute right-8 top-8 text-slate-300 hover:text-slate-900"><i data-lucide="x" size="24"></i></button>
                                {showModal === 'add' ? (
                                    <form onSubmit={async (e) => {
                                        e.preventDefault();
                                        const name = e.target.name.value;
                                        if (categoryFilter === 'apparel') {
                                            const sizes = { S: parseInt(e.target.s.value || 0), M: parseInt(e.target.m.value || 0), L: parseInt(e.target.l.value || 0), XL: parseInt(e.target.xl.value || 0) };
                                            await window.FB.addDoc(window.FB.collection(db, 'artifacts', appId, 'public', 'data', 'inventory'), { name, category: 'apparel', sizes, createdAt: new Date().toISOString() });
                                        } else {
                                            await window.FB.addDoc(window.FB.collection(db, 'artifacts', appId, 'public', 'data', 'inventory'), { 
                                                name, category: 'aksesoris', 
                                                stock: parseInt(e.target.stock.value || 0), 
                                                minStock: parseInt(e.target.minStock.value || 5),
                                                location: e.target.location.value || 'Rak Utama',
                                                createdAt: new Date().toISOString() 
                                            });
                                        }
                                        setShowModal(null);
                                    }}>
                                        <h2 className="text-2xl font-black italic uppercase mb-8 tracking-tighter">Tambah {categoryFilter}</h2>
                                        <div className="space-y-4">
                                            <input name="name" placeholder="NAMA PRODUK" required className="w-full p-4 bg-slate-50 rounded-2xl border border-slate-200 font-bold uppercase text-xs outline-none focus:ring-2 ring-indigo-500/20" />
                                            {categoryFilter === 'apparel' ? (
                                                <div className="grid grid-cols-2 gap-3">
                                                    {['S', 'M', 'L', 'XL'].map(s => (
                                                        <div key={s}><label className="text-[8px] font-black uppercase text-slate-400 ml-2">Size {s}</label><input name={s.toLowerCase()} type="number" defaultValue="0" className="w-full p-4 bg-slate-50 rounded-2xl border border-slate-200 font-bold text-xs" /></div>
                                                    ))}
                                                </div>
                                            ) : (
                                                <div className="space-y-4">
                                                    <div><label className="text-[8px] font-black uppercase text-slate-400 ml-2">Stok Awal</label><input name="stock" type="number" defaultValue="0" className="w-full p-4 bg-slate-50 rounded-2xl border border-slate-200 font-bold text-xs" /></div>
                                                    <div className="grid grid-cols-2 gap-3">
                                                        <div><label className="text-[8px] font-black uppercase text-slate-400 ml-2">Limit Kritis</label><input name="minStock" type="number" defaultValue="5" className="w-full p-4 bg-slate-50 rounded-2xl border border-slate-200 font-bold text-xs" /></div>
                                                        <div><label className="text-[8px] font-black uppercase text-slate-400 ml-2">Lokasi Rak</label><input name="location" placeholder="Rak A1" className="w-full p-4 bg-slate-50 rounded-2xl border border-slate-200 font-bold text-xs uppercase" /></div>
                                                    </div>
                                                </div>
                                            )}
                                            <button type="submit" className="w-full py-5 bg-indigo-600 text-white font-black rounded-2xl uppercase italic tracking-widest text-[10px] shadow-xl mt-4">Simpan Produk</button>
                                        </div>
                                    </form>
                                ) : (
                                    <form onSubmit={async (e) => {
                                        e.preventDefault();
                                        const amount = parseInt(e.target.amount.value);
                                        await processTransaction(selectedItem, selectedSize, amount, showModal);
                                        setShowModal(null);
                                    }} className="text-center">
                                        <h2 className={`text-2xl font-black italic uppercase mb-2 ${showModal === 'in' ? 'text-emerald-500' : 'text-rose-500'}`}>{showModal === 'in' ? 'Stok Masuk' : 'Stok Keluar'}</h2>
                                        <p className="text-[10px] font-black text-slate-400 uppercase italic mb-8">{selectedItem?.name} {selectedSize && `(${selectedSize})`}</p>
                                        <input name="amount" type="number" required min="1" autoFocus placeholder="0" className="w-full text-center text-8xl font-black italic bg-transparent outline-none mb-10 tracking-tighter" />
                                        <button type="submit" className={`w-full py-5 text-white font-black rounded-2xl uppercase italic tracking-widest text-[10px] shadow-xl ${showModal === 'in' ? 'bg-emerald-500 shadow-emerald-500/20' : 'bg-rose-500 shadow-rose-500/20'}`}>Konfirmasi Database</button>
                                    </form>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
