<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ritus Street Inventory</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .sidebar-white { background: #ffffff; color: #1e293b; }
        input[type="number"]::-webkit-inner-spin-button { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, className, onClick }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className} onClick={onClick}></i>;
        };

        function App() {
            const [user, setUser] = useState(null);
            const [showPass, setShowPass] = useState(false);
            const [activeTab, setActiveTab] = useState('Dashboard');
            const [showModal, setShowModal] = useState(false);
            
            // Database Statis (Bisa disambung ke Firestore)
            const [inventory, setInventory] = useState([]);
            const [logs, setLogs] = useState([]);
            const [formData, setFormData] = useState({ name: '', qty: '', category: 'Apparel' });

            const handleAddStock = (e) => {
                e.preventDefault();
                const newItem = { ...formData, id: Date.now(), date: new Date().toLocaleString() };
                setInventory([newItem, ...inventory]);
                setLogs([{ msg: `Entry: ${formData.name} (${formData.qty})`, time: new Date().toLocaleTimeString() }, ...logs]);
                setShowModal(false);
                setFormData({ name: '', qty: '', category: 'Apparel' });
            };

            if (!user) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-[#020617] p-6">
                        <div className="w-full max-w-sm animate-in fade-in zoom-in duration-500">
                            <div className="text-center mb-10">
                                <h2 className="text-5xl font-black italic text-white tracking-tighter">RITUS STREET</h2>
                                <p className="text-blue-500 text-[10px] tracking-[0.4em] font-bold uppercase mt-2">Inventory System</p>
                            </div>
                            <div className="glass p-8 rounded-[2.5rem] shadow-2xl">
                                <div className="space-y-4">
                                    <div>
                                        <label className="text-[10px] font-black text-slate-500 uppercase ml-2 mb-2 block">Identity</label>
                                        <input type="email" placeholder="admin@ritus.com" className="w-full bg-slate-800/50 border border-white/5 p-4 rounded-2xl outline-none text-white text-sm" />
                                    </div>
                                    <div className="relative">
                                        <label className="text-[10px] font-black text-slate-500 uppercase ml-2 mb-2 block">Security Code</label>
                                        <input 
                                            type={showPass ? "text" : "password"} 
                                            placeholder="••••••••" 
                                            className="w-full bg-slate-800/50 border border-white/5 p-4 rounded-2xl outline-none text-white text-sm" 
                                        />
                                        <button 
                                            type="button"
                                            onClick={() => setShowPass(!showPass)}
                                            className="absolute right-4 bottom-3.5 text-slate-500 hover:text-blue-500 transition-colors"
                                        >
                                            <Icon name={showPass ? "eye-off" : "eye"} className="w-5 h-5" />
                                        </button>
                                    </div>
                                    <button onClick={() => setUser(true)} className="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-black text-white shadow-lg shadow-blue-600/20 mt-4 transition-all active:scale-95">
                                        LOGIN SYSTEM
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex min-h-screen bg-[#f8fafc]">
                    {/* SIDEBAR */}
                    <aside className="w-72 sidebar-white border-r border-slate-200 p-8 flex flex-col shadow-xl">
                        <div className="mb-12"><h2 className="text-2xl font-black italic tracking-tighter text-slate-900">RITUS<span className="text-blue-600">.</span></h2></div>
                        <nav className="flex-1 space-y-2">
                            {[
                                { id: 'Dashboard', icon: 'layout-grid' },
                                { id: 'Apparel', icon: 'shirt' },
                                { id: 'Accessories', icon: 'watch' },
                                { id: 'Cans', icon: 'container' }
                            ].map(tab => (
                                <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`w-full flex items-center gap-4 px-5 py-4 rounded-2xl font-bold text-sm transition-all ${activeTab === tab.id ? 'bg-blue-600 text-white shadow-lg shadow-blue-200' : 'text-slate-400 hover:bg-slate-50'}`}>
                                    <Icon name={tab.icon} className="w-5 h-5" /> {tab.id}
                                </button>
                            ))}
                        </nav>
                        <button onClick={() => setUser(false)} className="mt-auto py-4 bg-red-50 text-red-600 rounded-2xl font-bold text-[10px] uppercase tracking-widest border border-red-100">Sign Out</button>
                    </aside>

                    {/* CONTENT */}
                    <main className="flex-1 p-10 overflow-y-auto">
                        <div className="flex justify-between items-center mb-10">
                            <div><h1 className="text-4xl font-black text-slate-900 uppercase tracking-tight">{activeTab}</h1><p className="text-slate-400 text-sm font-medium">Warehouse Management System</p></div>
                            <button onClick={() => setShowModal(true)} className="bg-slate-900 text-white px-8 py-4 rounded-2xl font-bold text-sm hover:bg-blue-600 transition-all shadow-xl shadow-slate-200">+ New Entry</button>
                        </div>

                        {/* STATS */}
                        <div className="grid grid-cols-3 gap-8 mb-12">
                            <div className="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm">
                                <Icon name="package" className="w-6 h-6 text-blue-600 mb-4" />
                                <p className="text-[10px] font-black text-slate-400 tracking-widest uppercase mb-1">Items Stored</p>
                                <h2 className="text-4xl font-black text-slate-900">{inventory.length}</h2>
                            </div>
                            <div className="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm">
                                <Icon name="activity" className="w-6 h-6 text-emerald-500 mb-4" />
                                <p className="text-[10px] font-black text-slate-400 tracking-widest uppercase mb-1">Recent Activity</p>
                                <h2 className="text-4xl font-black text-slate-900">{logs.length}</h2>
                            </div>
                            <div className="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm">
                                <Icon name="shield-check" className="w-6 h-6 text-amber-500 mb-4" />
                                <p className="text-[10px] font-black text-slate-400 tracking-widest uppercase mb-1">Database Status</p>
                                <h2 className="text-4xl font-black text-slate-900">Live</h2>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                            {/* TABLE */}
                            <div className="lg:col-span-2 bg-white rounded-[3rem] shadow-sm border border-slate-100 overflow-hidden">
                                <div className="p-8 border-b border-slate-50"><h3 className="font-bold text-slate-900">Inventory List</h3></div>
                                <div className="overflow-x-auto p-4">
                                    <table className="w-full text-left">
                                        <thead>
                                            <tr className="text-[10px] uppercase tracking-tighter text-slate-400 font-black">
                                                <th className="p-4">Product Name</th>
                                                <th className="p-4">Category</th>
                                                <th className="p-4">Qty</th>
                                                <th className="p-4">Timestamp</th>
                                            </tr>
                                        </thead>
                                        <tbody className="text-sm">
                                            {inventory.length === 0 ? (
                                                <tr><td colSpan="4" className="p-20 text-center text-slate-300 italic">No data found.</td></tr>
                                            ) : (
                                                inventory.filter(i => activeTab === 'Dashboard' || i.category === activeTab).map(item => (
                                                    <tr key={item.id} className="hover:bg-slate-50 transition-all group">
                                                        <td className="p-4 font-bold text-slate-800">{item.name}</td>
                                                        <td className="p-4"><span className="px-3 py-1 bg-slate-100 text-slate-500 rounded-full text-[10px] font-bold uppercase">{item.category}</span></td>
                                                        <td className="p-4 font-black text-blue-600">{item.qty}</td>
                                                        <td className="p-4 text-[10px] text-slate-400">{item.date}</td>
                                                    </tr>
                                                ))
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            </div>

                            {/* LOGS */}
                            <div className="bg-white rounded-[3rem] shadow-sm border border-slate-100 p-8">
                                <h3 className="font-bold text-slate-900 mb-8 flex items-center gap-2">
                                    <Icon name="history" className="w-5 h-5 text-blue-500" /> Action Logs
                                </h3>
                                <div className="space-y-6">
                                    {logs.map((log, i) => (
                                        <div key={i} className="relative pl-6 border-l-2 border-slate-100 py-1">
                                            <div className="absolute -left-[5px] top-2 w-2 h-2 bg-blue-500 rounded-full"></div>
                                            <p className="text-xs font-bold text-slate-700 leading-none">{log.msg}</p>
                                            <p className="text-[10px] text-slate-400 mt-2">{log.time}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </main>

                    {/* MODAL */}
                    {showModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md flex items-center justify-center p-6 z-50 animate-in fade-in duration-300">
                            <div className="bg-white w-full max-w-md rounded-[3rem] p-10 shadow-2xl scale-in-center">
                                <h2 className="text-3xl font-black text-slate-900 mb-8 uppercase tracking-tighter">Add New Stock</h2>
                                <form onSubmit={handleAddStock} className="space-y-6">
                                    <div>
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">Item Name</label>
                                        <input required value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} className="w-full bg-slate-50 border border-slate-100 p-4 rounded-2xl outline-none focus:border-blue-500 font-bold" />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">Quantity</label>
                                            <input required type="number" value={formData.qty} onChange={e => setFormData({...formData, qty: e.target.value})} className="w-full bg-slate-50 border border-slate-100 p-4 rounded-2xl outline-none focus:border-blue-500 font-bold" />
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">Category</label>
                                            <select value={formData.category} onChange={e => setFormData({...formData, category: e.target.value})} className="w-full bg-slate-50 border border-slate-100 p-4 rounded-2xl outline-none font-bold text-sm">
                                                <option>Apparel</option><option>Accessories</option><option>Cans</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div className="flex gap-4 pt-6">
                                        <button type="button" onClick={() => setShowModal(false)} className="flex-1 py-4 text-slate-400 font-bold hover:text-slate-600 transition-all uppercase text-xs tracking-widest">Cancel</button>
                                        <button type="submit" className="flex-1 py-4 bg-blue-600 text-white font-black rounded-2xl shadow-xl shadow-blue-100 hover:bg-blue-700 transition-all uppercase text-xs tracking-widest">Save Item</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
